<!DOCTYPE html>
<html lang="zh-CN">
  <head>
<script data-atools-real-entry-fixture-bridge="true">
(function(){
  var pluginId = "random-data";
  var featureCode = "randomDataSettings";
  var fixtureErrors = [];
  var bridgeApiProbeIds = ["fixture-bridge-get-path","fixture-bridge-context","fixture-bridge-db-storage","fixture-bridge-db-all-docs","fixture-bridge-app-identity","fixture-bridge-system-flags","fixture-bridge-preload-ky","fixture-bridge-services","fixture-bridge-web-storage"];
  function mark(name, value) {
    if (document.body) document.body.setAttribute(name, String(value));
  }
  function errorText(value) {
    if (value && value.message) return String(value.message);
    if (typeof value === 'object') {
      try { return JSON.stringify(value); } catch (error) { return String(value); }
    }
    return String(value || 'error');
  }
  function recordError(value) {
    fixtureErrors.push(errorText(value));
    mark('data-atools-real-entry-errors', fixtureErrors.length);
    mark('data-atools-real-entry-error-messages', fixtureErrors.slice(-5).join(' | ').slice(0, 800));
  }
  function safeStorage() {
    var values = Object.create(null);
    return {
      get length() { return Object.keys(values).length; },
      key: function(index) { return Object.keys(values)[Number(index) || 0] || null; },
      getItem: function(key) {
        key = String(key);
        return Object.prototype.hasOwnProperty.call(values, key) ? values[key] : null;
      },
      setItem: function(key, value) {
        values[String(key)] = String(value);
      },
      removeItem: function(key) {
        delete values[String(key)];
      },
      clear: function() {
        values = Object.create(null);
      }
    };
  }
  function installStorageStub(name) {
    try {
      void window[name];
      return;
    } catch (error) {
      // Sandboxed iframes without allow-same-origin throw on storage access.
    }
    try {
      Object.defineProperty(window, name, {
        value: safeStorage(),
        configurable: true
      });
    } catch (error) {
      // Leave the original browser error visible if the property is not replaceable.
    }
  }
  installStorageStub('localStorage');
  installStorageStub('sessionStorage');
  function bridgeFunction(name) {
    return function(){ return Promise.resolve(null); };
  }
  function probeResult(id, passed, detail) {
    return { id: id, passed: passed === true, detail: detail ? String(detail).slice(0, 240) : '' };
  }
  async function probeBridgeApi(id, callback) {
    try {
      return probeResult(id, await callback() === true);
    } catch (error) {
      return probeResult(id, false, errorText(error));
    }
  }
  function markBridgeApiProbes(results) {
    var passed = results.filter(function(result) { return result.passed; }).length;
    var failedIds = results.filter(function(result) { return !result.passed; }).map(function(result) { return result.id; });
    mark('data-atools-real-entry-bridge-api-passed', passed);
    mark('data-atools-real-entry-bridge-api-total', results.length);
    mark('data-atools-real-entry-bridge-api-failed', failedIds.length);
    mark('data-atools-real-entry-bridge-api-failed-ids', failedIds.join(','));
    window.__atoolsRealEntryFixture.bridgeApiProbes = results;
    return { passed: passed, total: results.length, failedIds: failedIds };
  }
  function fixturePath(name) {
    return '/tmp/atools-real-entry-fixture/' + String(name || '');
  }
  function allDocsResult() {
    var rows = [];
    rows.rows = rows;
    rows.total_rows = 0;
    rows.offset = 0;
    return rows;
  }
  var fixtureContext = {
    pluginId: pluginId,
    pluginName: "随机数据",
    featureCode: featureCode,
    code: featureCode,
    type: "text",
    query: "随机数据设置",
    text: "随机数据设置",
    payload: "随机数据设置",
    option: {},
    args: [],
    files: [],
    paths: [],
    pluginEnterParams: {
      code: featureCode,
      type: "text",
      payload: "随机数据设置",
      text: "随机数据设置",
      option: {},
      args: [],
      files: [],
      paths: []
    },
    umami: {
      track: function(){ return undefined; },
      identify: function(){ return undefined; }
    }
  };
  var dbBridge = {
    get: function(){ return Promise.resolve(null); },
    put: function(){ return Promise.resolve({ ok: true, id: '', rev: 'fixture' }); },
    remove: function(){ return Promise.resolve({ ok: true, id: '', rev: 'fixture' }); },
    allDocs: function(){ return Promise.resolve(allDocsResult()); },
    postAttachment: function(){ return Promise.resolve({ ok: true, id: '', rev: 'fixture' }); },
    getAttachment: function(){ return Promise.resolve(null); },
    getAttachmentType: function(){ return Promise.resolve(''); },
    replicateStateFromCloud: function(){ return Promise.resolve({ ok: true, state: 'fixture' }); }
  };
  dbBridge.promises = dbBridge;
  var dbStorageBridge = safeStorage();
  var bridge = new Proxy({
    dbStorage: dbStorageBridge,
    db: dbBridge,
    showNotification: function(){ return undefined; },
    copyText: function(){ return Promise.resolve(undefined); },
    getWindowType: function(){ return 'main'; },
    getPath: function(name){ return fixturePath(name); },
    getContext: function(){ return fixtureContext; },
    getFeatures: function(){ return []; },
    getFeature: function(){ return null; },
    getUser: function(){ return null; },
    getAppName: function(){ return 'ATools'; },
    getAppVersion: function(){ return '3.0.0'; },
    getNativeId: function(){ return 0; },
    isMacOS: function(){ return true; },
    isMacOs: function(){ return true; },
    isWindows: function(){ return false; },
    isLinux: function(){ return false; },
    isDev: function(){ return true; },
    readCurrentBrowserUrl: function(){ return ''; },
    getCurrentBrowserUrl: function(){ return ''; },
    readCurrentFolderPath: function(){ return ''; },
    onPluginEnter: function(callback){ if (typeof callback === 'function') window.addEventListener('atools-plugin-enter', function(){ callback(fixtureContext); }); },
    onPluginReady: function(callback){ if (typeof callback === 'function') window.addEventListener('atools-plugin-ready', function(){ callback(fixtureContext); }); },
    outPlugin: function(payload){ window.__atoolsRealEntryFixtureOutput = payload; return undefined; },
    setSubInput: function(){ return undefined; },
    setExpendHeight: function(){ return undefined; },
    setExpandHeight: function(){ return undefined; }
  }, {
    get: function(target, prop) {
      if (prop in target) return target[prop];
      if (prop === 'promises') return target;
      var fn = bridgeFunction(String(prop));
      target[prop] = fn;
      return fn;
    }
  });
  window.utools = window.utools || bridge;
  window.ztools = window.ztools || window.utools;
  function kyResponse() {
    return {
      text: function(){ return Promise.resolve(''); },
      json: function(){ return Promise.resolve({}); },
      blob: function(){ return Promise.resolve(new Blob([])); },
      arrayBuffer: function(){ return Promise.resolve(new ArrayBuffer(0)); }
    };
  }
  function kyStub() {
    return kyResponse();
  }
  var kyMethods = {
    get: function(){ return kyResponse(); },
    post: function(){ return kyResponse(); },
    put: function(){ return kyResponse(); },
    delete: function(){ return kyResponse(); },
    create: function(){ return kyStub; }
  };
  kyStub.get = kyMethods.get;
  kyStub.post = kyMethods.post;
  kyStub.put = kyMethods.put;
  kyStub.delete = kyMethods.delete;
  kyStub.create = kyMethods.create;
  window.services = window.services || {
    umami: fixtureContext.umami,
    qrDecode: function(){ return Promise.resolve([]); },
    formatMybatisLog: function(value){ return String(value || ''); }
  };
  window.Preload = window.Preload || {
    umami: fixtureContext.umami,
    ky: kyStub,
    loadPage: function(){ return Promise.resolve(null); },
    downloader: function(){},
    wallpaper: function(){ return Promise.resolve(undefined); }
  };
  window.__atoolsRealEntryFixture = {
    pluginId: pluginId,
    pluginName: "随机数据",
    featureCode: featureCode,
    triggerType: "text",
    query: "随机数据设置",
    errors: fixtureErrors,
    bridgeApiProbeIds: bridgeApiProbeIds,
    bridgeApiProbes: []
  };
  async function runBridgeApiProbes() {
    var key = 'atools-fixture-probe';
    return Promise.all([
      probeBridgeApi('fixture-bridge-get-path', async function(){
        return typeof window.utools.getPath('home') === 'string' && window.utools.getPath('home').indexOf('/tmp/atools-real-entry-fixture/') === 0;
      }),
      probeBridgeApi('fixture-bridge-context', async function(){
        var context = window.utools.getContext();
        return context && context.pluginId === pluginId && context.featureCode === featureCode && context.pluginEnterParams && context.pluginEnterParams.code === featureCode;
      }),
      probeBridgeApi('fixture-bridge-db-storage', async function(){
        window.utools.dbStorage.setItem(key, 'ok');
        var stored = window.utools.dbStorage.getItem(key);
        window.utools.dbStorage.removeItem(key);
        return stored === 'ok' && window.utools.dbStorage.getItem(key) === null;
      }),
      probeBridgeApi('fixture-bridge-db-all-docs', async function(){
        var docs = await window.utools.db.allDocs();
        return Array.isArray(docs) && docs.rows === docs && docs.total_rows === 0;
      }),
      probeBridgeApi('fixture-bridge-app-identity', async function(){
        return window.utools.getAppName() === 'ATools' && typeof window.utools.getAppVersion() === 'string' && window.utools.getNativeId() === 0;
      }),
      probeBridgeApi('fixture-bridge-system-flags', async function(){
        return window.utools.isMacOS() === true && window.utools.isWindows() === false && window.utools.isLinux() === false && window.utools.isDev() === true;
      }),
      probeBridgeApi('fixture-bridge-preload-ky', async function(){
        var ky = window.Preload && window.Preload.ky;
        var created = ky && ky.create && ky.create();
        var response = created && created.get && created.get('/fixture');
        var json = response && response.json && await response.json();
        return !!ky && typeof created === 'function' && json && typeof json === 'object';
      }),
      probeBridgeApi('fixture-bridge-services', async function(){
        return !!window.services && window.services.umami.track() === undefined && window.services.formatMybatisLog('select 1') === 'select 1';
      }),
      probeBridgeApi('fixture-bridge-web-storage', async function(){
        window.localStorage.setItem(key, 'ok');
        window.sessionStorage.setItem(key, 'session');
        var passed = window.localStorage.getItem(key) === 'ok' && window.sessionStorage.getItem(key) === 'session';
        window.localStorage.removeItem(key);
        window.sessionStorage.removeItem(key);
        return passed && window.localStorage.getItem(key) === null;
      })
    ]);
  }
  window.addEventListener('error', function(event){
    recordError(event && (event.message || event.error) || 'error');
  });
  window.addEventListener('unhandledrejection', function(event){
    recordError(event && event.reason || 'unhandledrejection');
  });
  function ready() {
    mark('data-atools-real-entry-fixture', true);
    mark('data-atools-real-entry-plugin-id', pluginId);
    mark('data-atools-real-entry-feature-code', featureCode);
    mark('data-atools-real-entry-bridge-present', !!window.utools);
    mark('data-atools-real-entry-ztools-alias', window.ztools === window.utools);
    mark('data-atools-real-entry-errors', fixtureErrors.length);
    mark('data-atools-real-entry-error-messages', fixtureErrors.slice(-5).join(' | ').slice(0, 800));
    window.dispatchEvent(new CustomEvent('atools-plugin-enter', { detail: fixtureContext }));
    setTimeout(async function(){
      window.dispatchEvent(new CustomEvent('atools-plugin-ready', { detail: fixtureContext }));
      mark('data-atools-real-entry-ready', true);
      var bridgeApiProbes = await runBridgeApiProbes();
      markBridgeApiProbes(bridgeApiProbes);
      var probeResults = [
        { id: 'real-entry-fixture-ready', passed: document.body && document.body.getAttribute('data-atools-real-entry-ready') === 'true' },
        { id: 'real-entry-fixture-bridge', passed: !!window.utools },
        { id: 'real-entry-fixture-ztools-alias', passed: window.ztools === window.utools },
        { id: 'real-entry-fixture-identity', passed: document.body && document.body.getAttribute('data-atools-real-entry-plugin-id') === pluginId && document.body.getAttribute('data-atools-real-entry-feature-code') === featureCode },
        { id: 'real-entry-fixture-errors', passed: fixtureErrors.length === 0 }
      ].concat(bridgeApiProbes);
      window.parent && window.parent.postMessage({
        __atools_real_entry_fixture_probe__: true,
        pluginId: pluginId,
        featureCode: featureCode,
        probes: probeResults,
        errors: fixtureErrors,
        bridgeApiProbes: bridgeApiProbes
      }, '*');
    }, 80);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ready);
  } else {
    ready();
  }
})();

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机数据设置</title>
    <style>
      :root {
        color-scheme: light;
        --bg: oklch(0.965 0.004 255);
        --panel: oklch(0.99 0.002 255);
        --panel-strong: oklch(0.95 0.004 255);
        --text: oklch(0.29 0.01 255);
        --muted: oklch(0.54 0.008 255);
        --line: oklch(0.89 0.004 255);
        --line-strong: oklch(0.8 0.006 255);
        --accent: oklch(0.46 0.012 255);
        --accent-strong: oklch(0.22 0.01 255);
        --danger: oklch(0.58 0.12 22);
        --shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
        --radius: 14px;
      }

      :root[data-theme='dark'] {
        color-scheme: dark;
        --bg: oklch(0.215 0.008 255);
        --panel: oklch(0.25 0.008 255);
        --panel-strong: oklch(0.29 0.008 255);
        --text: oklch(0.92 0.004 255);
        --muted: oklch(0.7 0.006 255);
        --line: oklch(0.34 0.008 255);
        --line-strong: oklch(0.42 0.008 255);
        --accent: oklch(0.76 0.01 255);
        --accent-strong: oklch(0.96 0.002 255);
        --danger: oklch(0.68 0.12 22);
        --shadow: none;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .shell {
        width: min(760px, calc(100vw - 20px));
        margin: 0 auto;
        padding: 10px 0 14px;
      }

      .tabs {
        display: flex;
        gap: 2px;
        margin-bottom: 8px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .tab-button {
        flex: 1;
        height: 30px;
        padding: 0 14px;
        border: none;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        border-radius: 999px;
        cursor: pointer;
        transition: background 160ms ease, color 160ms ease;
      }

      .tab-button.is-active {
        background: var(--panel-strong);
        color: var(--accent-strong);
      }

      .tab-button:hover:not(.is-active) {
        color: var(--text);
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        padding: 0 2px;
      }

      .summary {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .summary h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        line-height: 1.2;
      }

      .summary span {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }

      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
        flex-shrink: 0;
      }

      .segmented {
        display: inline-flex;
        align-items: center;
        padding: 2px;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: var(--panel-strong);
      }

      .segmented button {
        height: 26px;
        min-width: 44px;
        padding: 0 12px;
        border: none;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        border-radius: 999px;
        cursor: pointer;
        transition: background 160ms ease, color 160ms ease, opacity 160ms ease;
      }

      .segmented button:hover:not([disabled]) {
        background: var(--panel);
      }

      .segmented button[disabled] {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .segmented-divider {
        width: 1px;
        height: 14px;
        background: var(--line);
      }

      .save-button {
        min-height: 32px;
        padding: 0 12px;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: var(--panel);
        color: var(--text);
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .save-button.is-saving {
        border-color: var(--accent);
      }

      .panel[hidden] {
        display: none;
      }

      .custom-toolbar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 8px;
      }

      .add-button {
        min-height: 32px;
        padding: 0 14px;
        border: 1px dashed var(--line-strong);
        border-radius: 12px;
        background: transparent;
        color: var(--accent-strong);
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: border-color 160ms ease, background 160ms ease;
      }

      .add-button:hover {
        border-style: solid;
        border-color: var(--accent);
        background: var(--panel);
      }

      .list {

      }

        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .item {
        padding: 10px 12px;
      }

      .item.is-disabled {
        opacity: 0.58;
      }

      .item.is-disabled .preview-button,
      .item.is-disabled .chip-input,
      .item.is-disabled .command-chip,
      .item.is-disabled .content-input {
        opacity: 0.82;
      }

      .item-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-width: 0;
      }

      .item-row + .item-row,
      .preview-box {
        margin-top: 8px;
      }

      .content-row {
        align-items: flex-start;
      }

      .item-title {
        min-width: 0;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .content-input {
        flex: 1;
        min-width: 0;
        min-height: 32px;
        max-height: 140px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel-strong);
        color: var(--text);
        font: inherit;
        font-size: 13px;
        line-height: 1.45;
        resize: vertical;
        outline: none;
      }

      .content-input:focus {
        border-color: var(--accent);
      }

      .content-input::placeholder {
        color: var(--muted);
      }

      .row-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .delete-button {
        flex-shrink: 0;
        width: 26px;
        height: 26px;
        padding: 0;
        border: 1px solid transparent;
        border-radius: 50%;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        transition: color 160ms ease, border-color 160ms ease;
      }

      .delete-button:hover {
        color: var(--danger);
        border-color: color-mix(in oklch, var(--danger) 40%, var(--line));
      }

      .switch {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
      }

      .switch input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .switch-ui {
        position: relative;
        width: 36px;
        height: 20px;
        border-radius: 999px;
        background: var(--line-strong);
        transition: background 160ms ease;
      }

      .switch-ui::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--panel);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
        transition: transform 160ms ease;
      }

      .switch input:checked + .switch-ui {
        background: var(--accent);
      }

      .switch input:checked + .switch-ui::after {
        transform: translateX(16px);
      }

      .switch-copy {
        font-size: 12px;
        color: var(--muted);
      }

      .conflict-bar {
        margin-bottom: 8px;
        padding: 8px 10px;
        border: 1px solid color-mix(in oklch, var(--danger) 28%, var(--line));
        border-radius: 10px;
        background: color-mix(in oklch, var(--danger) 6%, var(--panel));
        color: var(--danger);
        font-size: 12px;
        line-height: 1.5;
      }

        align-items: flex-start;
        justify-content: space-between;

      }

      .command-stack {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-width: 0;
        flex: 1;
      }

      .command-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 100%;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel-strong);
        font-size: 12px;
        line-height: 1;
      }

      .command-chip.is-conflict {
        border-color: color-mix(in oklch, var(--danger) 50%, var(--line));

      }

      .command-chip span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chip-remove {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        padding: 0;
        border: none;
        background: transparent;
        color: var(--muted);
        font: inherit;
        line-height: 1;
        cursor: pointer;
      }

      .chip-remove:hover {
        color: var(--danger);
      }

      .chip-input {
        width: 86px;
        min-width: 72px;
        height: 28px;
        padding: 0 10px;
        border: 1px dashed var(--line-strong);
        border-radius: 999px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 12px;
        outline: none;
      }

      .chip-input:focus {
        border-style: solid;
        border-color: var(--accent);
      }

      .preview-button {
        flex-shrink: 0;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      .preview-button:hover {
        border-color: var(--accent);
      }

      .preview-box {
        padding-top: 8px;
        border-top: 1px dashed var(--line);
      }

      .preview-box-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      .preview-copy {
        min-height: 24px;
        padding: 0 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-size: 11px;
        cursor: pointer;
      }

      .preview-copy:hover {
        border-color: var(--line-strong);
        color: var(--text);
      }

      .preview-box pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
        font-size: 12px;
        line-height: 1.55;
        color: var(--muted);
      }

      .empty {
        padding: 18px;
        font-size: 13px;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .shell {
          width: calc(100vw - 14px);
          padding-top: 8px;
        }

        .toolbar,
        .item-row,
        .command-area {
          align-items: flex-start;
        }

        .toolbar,
        .command-area {
          flex-direction: column;
        }

        .summary {
          flex-wrap: wrap;
        }

        .preview-button {
          align-self: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="tabs" role="tablist">
        <button class="tab-button is-active" type="button" data-tab="builtin" role="tab" aria-selected="true">内置数据</button>
        <button class="tab-button" type="button" data-tab="custom" role="tab" aria-selected="false">自定义</button>
      </div>
      <header class="toolbar">
        <div class="summary">
          <h1>随机数据设置</h1>
          <span id="enabledCount">0 / 0 已开启</span>
        </div>
        <div class="toolbar-actions">
          <div class="segmented" role="group" aria-label="批量开关">
            <button id="enableAllButton" type="button">全开</button>
            <span class="segmented-divider" aria-hidden="true"></span>
            <button id="disableAllButton" type="button">全关</button>
          </div>
          <button id="saveButton" class="save-button" type="button" disabled>已自动保存</button>
        </div>
      </header>
      <main>
        <section id="builtinPanel" class="panel" data-tab-panel="builtin">
          <div id="builtinList" class="list"></div>
        </section>
        <section id="customPanel" class="panel" data-tab-panel="custom" hidden>
          <div class="custom-toolbar">
            <button id="addCustomButton" class="add-button" type="button">+ 新增自定义项</button>
          </div>
          <div id="customList" class="list"></div>
        </section>
      </main>
    </div>
    <script>
      const builtinApi = window.randomDataApi
      const customApi = window.customFillApi
      const tabsContainer = document.querySelector('.tabs')
      const tabButtons = Array.from(document.querySelectorAll('.tab-button'))
      const builtinPanel = document.getElementById('builtinPanel')
      const customPanel = document.getElementById('customPanel')
      const builtinListElement = document.getElementById('builtinList')
      const customListElement = document.getElementById('customList')
      const enabledCountElement = document.getElementById('enabledCount')
      const saveButton = document.getElementById('saveButton')
      const enableAllButton = document.getElementById('enableAllButton')
      const disableAllButton = document.getElementById('disableAllButton')
      const addCustomButton = document.getElementById('addCustomButton')

      const state = {
        activeTab: 'builtin',
        builtin: {
          items: [],
          previews: {},
          conflicts: {}
        },
        custom: {
          items: []
        },
        saving: false,
        pendingSave: false,
        dirty: { builtin: false, custom: false }
      }

      let autoSaveTimer = 0
      let focusState = null

      function applyTheme() {
        const dark = Boolean(window.ztools && typeof window.ztools.isDarkColors === 'function' && window.ztools.isDarkColors())
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
      }

      function updateHeight() {
        if (window.ztools && typeof window.ztools.setExpendHeight === 'function') {
          window.ztools.setExpendHeight(620)
        }
      }

      function showNotification(message) {
        if (window.ztools && typeof window.ztools.showNotification === 'function') {
          window.ztools.showNotification(message)
        }
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
      }

      function decorateBuiltinItems(items) {
        return items.map(item => ({
          ...item,
          commands: Array.isArray(item.commands) ? item.commands.slice() : []
        }))
      }

      function decorateCustomItems(items) {
        return items.map(item => ({
          id: item.id,
          enabled: item.enabled !== false,
          content: typeof item.content === 'string' ? item.content : '',
          commands: Array.isArray(item.commands) ? item.commands.slice() : []
        }))
      }

      function findBuiltinItem(code) {
        return state.builtin.items.find(item => item.code === code)
      }

      function findCustomItem(id) {
        return state.custom.items.find(item => item.id === id)
      }

      function activeItems() {
        return state.activeTab === 'builtin' ? state.builtin.items : state.custom.items
      }

      function normalizeCommand(value) {
        return String(value || '').trim()
      }

      function bulkSetEnabled(enabled) {
        const items = activeItems()
        let changed = false

        for (const item of items) {
          if (item.enabled !== enabled) {
            item.enabled = enabled
            changed = true
          }
        }

        if (!changed) {
          return
        }

        renderActiveList()
        scheduleAutoSave(state.activeTab)
      }

      function renderSummary() {
        const items = activeItems()
        const enabledCount = items.filter(item => item.enabled).length
        const total = items.length
        enabledCountElement.textContent = `${enabledCount} / ${total} 已开启`

        saveButton.classList.toggle('is-saving', state.saving)
        saveButton.textContent = state.saving ? '保存中…' : state.pendingSave ? '等待保存…' : '已自动保存'
      }

      function rememberInputFocus(input) {
        if (!(input instanceof HTMLInputElement) && !(input instanceof HTMLTextAreaElement)) {
          focusState = null
          return
        }

        const row = input.closest('[data-key]')
        focusState = row ? {
          key: row.dataset.key || '',
          action: input.dataset.action || '',
          value: input.value,
          shouldRestore: true
        } : null
      }

      function restoreInputFocus() {
        if (!focusState) {
          return
        }

        const selector = `[data-key="${focusState.key}"] [data-action="${focusState.action}"]`
        const input = document.querySelector(selector)

        if (!(input instanceof HTMLInputElement) && !(input instanceof HTMLTextAreaElement)) {
          focusState = null
          return
        }

        input.focus()
        if (input.value !== focusState.value) {
          input.value = focusState.value
        }
        const length = input.value.length
        if (typeof input.setSelectionRange === 'function') {
          input.setSelectionRange(length, length)
        }
        focusState.shouldRestore = false
      }

      function captureFocus() {
        const activeElement = document.activeElement
        if ((activeElement instanceof HTMLInputElement && activeElement.dataset.action === 'add-command')
          || (activeElement instanceof HTMLTextAreaElement && activeElement.dataset.action === 'content')) {
          rememberInputFocus(activeElement)
        } else if (focusState && focusState.shouldRestore !== true) {
          focusState = null
        }
      }

      function updateBuiltinConflicts() {
        const commandMap = {}

        for (const item of state.builtin.items) {
          if (item.enabled === false) {
            continue
          }

          for (const command of item.commands) {
            const key = normalizeCommand(command)

            if (!key) {
              continue
            }

            if (!commandMap[key]) {
              commandMap[key] = []
            }

            commandMap[key].push(item.explain)
          }
        }

        const conflicts = {}

        for (const [command, names] of Object.entries(commandMap)) {
          if (names.length > 1) {
            conflicts[command] = names
          }
        }

        state.builtin.conflicts = conflicts
      }

      function renderCommandChips(commands, conflicts) {
        const chips = commands.map(command => `
          <div class="command-chip${conflicts && conflicts[command] ? ' is-conflict' : ''}">
            <span>${escapeHtml(command)}</span>
            <button type="button" class="chip-remove" data-action="remove-command" data-command="${escapeHtml(command)}">×</button>
          </div>
        `)

        chips.push('<input class="chip-input" data-action="add-command" type="text" inputmode="text" autocomplete="off" placeholder="+ 指令">')
        return chips.join('')
      }

      function renderPreview(code) {
        if (Object.prototype.hasOwnProperty.call(state.builtin.previews, code) === false) {
          return ''
        }

        return `
          <div class="preview-box">
            <div class="preview-box-head">
              <span class="switch-copy">已生成</span>
              <button type="button" class="preview-copy" data-action="copy-preview">复制</button>
            </div>
            <pre>${escapeHtml(state.builtin.previews[code])}</pre>
          </div>
        `
      }

      async function copyPreviewText(text) {
        if (!text) {
          return
        }

        if (window.ztools && typeof window.ztools.copyText === 'function') {
          const result = window.ztools.copyText(text)

          if (result !== false) {
            showNotification('已复制')
            return
          }
        }

        if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
          await navigator.clipboard.writeText(text)
          showNotification('已复制')
        }
      }

      function renderBuiltinList() {
        captureFocus()

        if (state.builtin.items.length === 0) {
          builtinListElement.innerHTML = '<section class="empty">当前没有可配置项目。</section>'
          return
        }

        updateBuiltinConflicts()
        const conflicts = state.builtin.conflicts
        const conflictEntries = Object.entries(conflicts)
        const conflictBar = conflictEntries.length > 0 ? `
          <section class="conflict-bar">
            以下指令存在冲突：${conflictEntries.map(([command, names]) => `${escapeHtml(command)}（${escapeHtml(names.join('、'))}）`).join('；')}
          </section>
        ` : ''

        builtinListElement.innerHTML = `${conflictBar}${state.builtin.items.map((item, index) => `
          <section class="item${item.enabled ? '' : ' is-disabled'}" data-key="b:${escapeHtml(item.code)}" data-code="${escapeHtml(item.code)}" style="--index:${index}">
            <div class="item-row">
              <div class="item-title">${escapeHtml(item.explain)}</div>
              <label class="switch">
                <input type="checkbox" data-action="enabled" ${item.enabled ? 'checked' : ''}>
                <span class="switch-ui"></span>
                <span class="switch-copy">${item.enabled ? '开启' : '关闭'}</span>
              </label>
            </div>
            <div class="item-row command-area">
              <div class="command-stack">${renderCommandChips(item.commands, conflicts)}</div>
              <button type="button" class="preview-button" data-action="sample">生成数据</button>
            </div>
            ${renderPreview(item.code)}
          </section>
        `).join('')}`

        if (focusState && focusState.shouldRestore) {
          restoreInputFocus()
        }
      }

      function renderCustomList() {
        captureFocus()

        if (state.custom.items.length === 0) {
          customListElement.innerHTML = '<section class="empty">还没有自定义填充项。点上方的「+ 新增自定义项」开始。</section>'
          return
        }

        customListElement.innerHTML = state.custom.items.map((item, index) => `
          <section class="item${item.enabled ? '' : ' is-disabled'}" data-key="c:${escapeHtml(item.id)}" data-id="${escapeHtml(item.id)}" style="--index:${index}">
            <div class="item-row content-row">
              <textarea class="content-input" data-action="content" rows="1" placeholder="触发时填入的内容…">${escapeHtml(item.content)}</textarea>
              <div class="row-actions">
                <label class="switch">
                  <input type="checkbox" data-action="enabled" ${item.enabled ? 'checked' : ''}>
                  <span class="switch-ui"></span>
                  <span class="switch-copy">${item.enabled ? '开启' : '关闭'}</span>
                </label>
                <button type="button" class="delete-button" data-action="delete-custom" title="删除此项">×</button>
              </div>
            </div>
            <div class="item-row command-area">
              <div class="command-stack">${renderCommandChips(item.commands, null)}</div>
            </div>
          </section>
        `).join('')

        if (focusState && focusState.shouldRestore) {
          restoreInputFocus()
        }
      }

      function renderActiveList() {
        if (state.activeTab === 'builtin') {
          renderBuiltinList()
        } else {
          renderCustomList()
        }
        renderSummary()
      }

      function switchTab(tab) {
        if (state.activeTab === tab) {
          return
        }

        state.activeTab = tab
        focusState = null

        for (const button of tabButtons) {
          const matched = button.dataset.tab === tab
          button.classList.toggle('is-active', matched)
          button.setAttribute('aria-selected', String(matched))
        }

        builtinPanel.hidden = tab !== 'builtin'
        customPanel.hidden = tab !== 'custom'

        renderActiveList()
      }

      function scheduleAutoSave(part) {
        if (part === 'builtin' || part === 'custom') {
          state.dirty[part] = true
        }
        state.pendingSave = true
        renderSummary()

        if (autoSaveTimer) {
          clearTimeout(autoSaveTimer)
        }

        autoSaveTimer = window.setTimeout(() => {
          autoSaveTimer = 0
          handleSave()
        }, 220)
      }

      async function handleSave() {
        if (state.saving) {
          state.pendingSave = true
          return
        }

        state.saving = true
        state.pendingSave = false
        renderSummary()

        try {
          if (state.dirty.builtin && builtinApi) {
            const payload = state.builtin.items.map(item => ({
              code: item.code,
              enabled: item.enabled,
              commands: item.commands.slice()
            }))
            state.builtin.items = decorateBuiltinItems(await builtinApi.saveItems(payload))
            state.dirty.builtin = false
          }

          if (state.dirty.custom && customApi) {
            const payload = state.custom.items.map(item => ({
              id: item.id,
              enabled: item.enabled,
              content: item.content,
              commands: item.commands.slice()
            }))
            state.custom.items = decorateCustomItems(await customApi.saveItems(payload))
            state.dirty.custom = false
          }

          renderActiveList()
        } catch (error) {
          showNotification(`保存失败：${error && error.message ? error.message : '未知错误'}`)
        } finally {
          state.saving = false
          renderSummary()

          if (state.pendingSave) {
            scheduleAutoSave()
          }
        }
      }

      function addBuiltinCommand(code, rawValue, input) {
        const item = findBuiltinItem(code)

        if (!item) {
          return
        }

        const values = String(rawValue)
          .split(/[\n,，]/)
          .map(normalizeCommand)
          .filter(Boolean)

        if (values.length === 0) {
          if (input) {
            input.value = ''
          }
          return
        }

        let changed = false

        for (const value of values) {
          if (item.commands.includes(value) === false) {
            item.commands.push(value)
            changed = true
          }
        }

        if (input) {
          input.value = ''
        }

        if (changed) {
          renderActiveList()
          scheduleAutoSave('builtin')
        }
      }

      function removeBuiltinCommand(code, command) {
        const item = findBuiltinItem(code)

        if (!item) {
          return
        }

        const next = item.commands.filter(value => value !== command)

        if (next.length === item.commands.length) {
          return
        }

        item.commands = next
        renderActiveList()
        scheduleAutoSave('builtin')
      }

      function addCustomCommand(id, rawValue, input) {
        const item = findCustomItem(id)

        if (!item) {
          return
        }

        const values = String(rawValue)
          .split(/[\n,，]/)
          .map(normalizeCommand)
          .filter(Boolean)

        if (values.length === 0) {
          if (input) {
            input.value = ''
          }
          return
        }

        let changed = false

        for (const value of values) {
          if (item.commands.includes(value) === false) {
            item.commands.push(value)
            changed = true
          }
        }

        if (input) {
          input.value = ''
        }

        if (changed) {
          renderActiveList()
          scheduleAutoSave('custom')
        }
      }

      function removeCustomCommand(id, command) {
        const item = findCustomItem(id)

        if (!item) {
          return
        }

        const next = item.commands.filter(value => value !== command)

        if (next.length === item.commands.length) {
          return
        }

        item.commands = next
        renderActiveList()
        scheduleAutoSave('custom')
      }

      function addCustomItem() {
        if (!customApi) {
          showNotification('当前环境不支持自定义填充')
          return
        }

        const newId = `cf_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`
        const newItem = {
          id: newId,
          enabled: true,
          content: '',
          commands: []
        }
        state.custom.items.unshift(newItem)
        renderActiveList()
        scheduleAutoSave('custom')

        window.setTimeout(() => {
          const textarea = customListElement.querySelector(
            `[data-id="${newId}"] .content-input`
          )
          if (textarea instanceof HTMLTextAreaElement) {
            textarea.focus()
          }
        }, 0)
      }

      function deleteCustomItem(id) {
        const idx = state.custom.items.findIndex(item => item.id === id)
        if (idx === -1) {
          return
        }
        const confirmed = window.confirm('确定删除该自定义项？')
        if (!confirmed) {
          return
        }
        state.custom.items.splice(idx, 1)
        renderActiveList()
        scheduleAutoSave('custom')
      }

      tabsContainer.addEventListener('click', event => {
        const button = event.target instanceof Element ? event.target.closest('.tab-button') : null
        if (!button) {
          return
        }
        const tab = button.dataset.tab
        if (tab === 'builtin' || tab === 'custom') {
          switchTab(tab)
        }
      })

      enableAllButton.addEventListener('click', () => bulkSetEnabled(true))
      disableAllButton.addEventListener('click', () => bulkSetEnabled(false))
      addCustomButton.addEventListener('click', addCustomItem)

      builtinListElement.addEventListener('change', event => {
        const target = event.target

        if (target instanceof HTMLInputElement === false || target.dataset.action !== 'enabled') {
          return
        }

        const row = target.closest('[data-code]')
        const item = row ? findBuiltinItem(row.dataset.code) : null

        if (!item) {
          return
        }

        item.enabled = target.checked
        const copy = row.querySelector('.switch-copy')

        if (copy) {
          copy.textContent = target.checked ? '开启' : '关闭'
        }

        renderActiveList()
        scheduleAutoSave('builtin')
      })

      builtinListElement.addEventListener('keydown', event => {
        const target = event.target

        if (target instanceof HTMLInputElement === false || target.dataset.action !== 'add-command') {
          return
        }

        if (event.key === 'Enter' || event.key === ',' || event.key === '，') {
          event.preventDefault()
          const row = target.closest('[data-code]')
          const code = row ? row.dataset.code : ''

          if (code) {
            rememberInputFocus(target)
            addBuiltinCommand(code, target.value, target)
          }
        }

        if (event.key === 'Backspace' && target.value === '') {
          const row = target.closest('[data-code]')
          const item = row ? findBuiltinItem(row.dataset.code) : null

          if (item && item.commands.length > 0) {
            rememberInputFocus(target)
            item.commands.pop()
            renderActiveList()
            scheduleAutoSave('builtin')
          }
        }
      })

      builtinListElement.addEventListener('blur', event => {
        const target = event.target

        if (target instanceof HTMLInputElement === false || target.dataset.action !== 'add-command') {
          return
        }

        const relatedTarget = event.relatedTarget instanceof Element ? event.relatedTarget : null

        if (relatedTarget && relatedTarget.closest('[data-action="sample"], [data-action="remove-command"]')) {
          return
        }

        window.setTimeout(() => {
          const row = target.closest('[data-code]')
          const code = row ? row.dataset.code : ''

          if (code) {
            addBuiltinCommand(code, target.value, target)
          }
        }, 0)
      }, true)

      builtinListElement.addEventListener('click', event => {
        const target = event.target instanceof Element ? event.target : null

        if (!target) {
          return
        }

        const removeButton = target.closest('[data-action="remove-command"]')

        if (removeButton) {
          const row = removeButton.closest('[data-code]')
          const code = row ? row.dataset.code : ''
          const command = removeButton.getAttribute('data-command') || ''

          if (code && command) {
            removeBuiltinCommand(code, command)
          }
          return
        }

        const copyButton = target.closest('[data-action="copy-preview"]')

        if (copyButton) {
          const row = copyButton.closest('[data-code]')
          const code = row ? row.dataset.code : ''
          const text = code ? state.builtin.previews[code] : ''

          if (text) {
            copyPreviewText(text).catch((error) => {
              showNotification(`复制失败：${error && error.message ? error.message : '未知错误'}`)
            })
          }
          return
        }

        const previewButton = target.closest('[data-action="sample"]')

        if (!previewButton) {
          return
        }

        const row = previewButton.closest('[data-code]')
        const code = row ? row.dataset.code : ''

        if (!code || !builtinApi) {
          return
        }

        state.builtin.previews[code] = builtinApi.generateSample(code)
        renderActiveList()
      })

      customListElement.addEventListener('change', event => {
        const target = event.target

        if (target instanceof HTMLInputElement === false || target.dataset.action !== 'enabled') {
          return
        }

        const row = target.closest('[data-id]')
        const item = row ? findCustomItem(row.dataset.id) : null

        if (!item) {
          return
        }

        item.enabled = target.checked
        const copy = row.querySelector('.switch-copy')

        if (copy) {
          copy.textContent = target.checked ? '开启' : '关闭'
        }

        renderActiveList()
        scheduleAutoSave('custom')
      })

      customListElement.addEventListener('input', event => {
        const target = event.target

        if (target instanceof HTMLTextAreaElement === false || target.dataset.action !== 'content') {
          return
        }

        const row = target.closest('[data-id]')
        const item = row ? findCustomItem(row.dataset.id) : null

        if (!item) {
          return
        }

        if (item.content === target.value) {
          return
        }

        item.content = target.value
        scheduleAutoSave('custom')
      })

      customListElement.addEventListener('keydown', event => {
        const target = event.target

        if (target instanceof HTMLInputElement === false || target.dataset.action !== 'add-command') {
          return
        }

        if (event.key === 'Enter' || event.key === ',' || event.key === '，') {
          event.preventDefault()
          const row = target.closest('[data-id]')
          const id = row ? row.dataset.id : ''

          if (id) {
            rememberInputFocus(target)
            addCustomCommand(id, target.value, target)
          }
        }

        if (event.key === 'Backspace' && target.value === '') {
          const row = target.closest('[data-id]')
          const item = row ? findCustomItem(row.dataset.id) : null

          if (item && item.commands.length > 0) {
            rememberInputFocus(target)
            item.commands.pop()
            renderActiveList()
            scheduleAutoSave('custom')
          }
        }
      })

      customListElement.addEventListener('blur', event => {
        const target = event.target

        if (target instanceof HTMLInputElement === false || target.dataset.action !== 'add-command') {
          return
        }

        const relatedTarget = event.relatedTarget instanceof Element ? event.relatedTarget : null

        if (relatedTarget && relatedTarget.closest('[data-action="remove-command"], [data-action="delete-custom"]')) {
          return
        }

        window.setTimeout(() => {
          const row = target.closest('[data-id]')
          const id = row ? row.dataset.id : ''

          if (id) {
            addCustomCommand(id, target.value, target)
          }
        }, 0)
      }, true)

      customListElement.addEventListener('click', event => {
        const target = event.target instanceof Element ? event.target : null

        if (!target) {
          return
        }

        const removeButton = target.closest('[data-action="remove-command"]')

        if (removeButton) {
          const row = removeButton.closest('[data-id]')
          const id = row ? row.dataset.id : ''
          const command = removeButton.getAttribute('data-command') || ''

          if (id && command) {
            removeCustomCommand(id, command)
          }
          return
        }

        const deleteButton = target.closest('[data-action="delete-custom"]')

        if (deleteButton) {
          const row = deleteButton.closest('[data-id]')
          const id = row ? row.dataset.id : ''

          if (id) {
            deleteCustomItem(id)
          }
        }
      })

      function init() {
        applyTheme()
        updateHeight()

        if (!builtinApi && !customApi) {
          builtinListElement.innerHTML = '<section class="empty">当前环境不支持随机数据配置页面。</section>'
          customListElement.innerHTML = '<section class="empty">当前环境不支持自定义填充。</section>'
          renderSummary()
          return
        }

        Promise.all([
          builtinApi ? builtinApi.getItems() : Promise.resolve(null),
          customApi ? customApi.getItems() : Promise.resolve(null)
        ]).then(([builtinItems, customItems]) => {
          if (builtinItems) {
            state.builtin.items = decorateBuiltinItems(builtinItems)
          }
          if (customItems) {
            state.custom.items = decorateCustomItems(customItems)
          }
          renderActiveList()
        }).catch(error => {
          showNotification(`加载配置失败：${error && error.message ? error.message : '未知错误'}`)
        })
      }

      init()
    </script>
  </body>
</html>
