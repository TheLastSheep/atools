name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: cargo fmt --all -- --check
      - name: Run cargo clippy --workspace --all-targets -- -D warnings
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee clippy.log || {
            diagnostic="$(tail -n 60 clippy.log)"
            diagnostic="${diagnostic//'%'/'%25'}"
            diagnostic="${diagnostic//$'\r'/'%0D'}"
            diagnostic="${diagnostic//$'\n'/'%0A'}"
            echo "::error title=Clippy diagnostics::$diagnostic"
            exit 1
          }
      - run: cargo test --workspace
      - name: Run pnpm test:fast
        shell: bash
        run: |
          set -o pipefail
          pnpm test:fast 2>&1 | tee test-fast.log || {
            diagnostic="$(tail -n 60 test-fast.log)"
            diagnostic="${diagnostic//'%'/'%25'}"
            diagnostic="${diagnostic//$'\r'/'%0D'}"
            diagnostic="${diagnostic//$'\n'/'%0A'}"
            echo "::error title=Fast-tier diagnostics::$diagnostic"
            exit 1
          }
      - run: pnpm check

  browser-and-desktop:
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:browser
      - run: pnpm test:desktop
        env:
          ATOOLS_DESKTOP_SMOKE_TIMEOUT_MS: 180000

  release-readiness:
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:check:macos:unsigned
