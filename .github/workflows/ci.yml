name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: cargo fmt --all -- --check
      - name: Run cargo clippy --workspace --all-targets -- -D warnings
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee clippy.log || {
            diagnostic="$(tail -n 60 clippy.log)"
            diagnostic="${diagnostic//'%'/'%25'}"
            diagnostic="${diagnostic//$'\r'/'%0D'}"
            diagnostic="${diagnostic//$'\n'/'%0A'}"
            echo "::error title=Clippy diagnostics::$diagnostic"
            exit 1
          }
      - run: cargo test --workspace
      - name: Run pnpm test:fast
        shell: bash
        run: |
          set -o pipefail
          pnpm test:fast 2>&1 | tee test-fast.log || {
            diagnostic="$(tail -n 60 test-fast.log)"
            diagnostic="${diagnostic//'%'/'%25'}"
            diagnostic="${diagnostic//$'\r'/'%0D'}"
            diagnostic="${diagnostic//$'\n'/'%0A'}"
            echo "::error title=Fast-tier diagnostics::$diagnostic"
            exit 1
          }
      - run: pnpm check

  browser-and-desktop:
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop
      - run: pnpm install --frozen-lockfile
      - name: Run pnpm test:browser
        shell: bash
        run: |
          set -o pipefail
          pnpm test:browser 2>&1 | tee test-browser.log || {
            diagnostic="$(tail -n 60 test-browser.log)"
            diagnostic="${diagnostic//'%'/'%25'}"
            diagnostic="${diagnostic//$'\r'/'%0D'}"
            diagnostic="${diagnostic//$'\n'/'%0A'}"
            echo "::error title=Browser-tier diagnostics::$diagnostic"
            exit 1
          }
      - name: Run pnpm test:desktop
        shell: bash
        env:
          ATOOLS_DESKTOP_SMOKE_TIMEOUT_MS: 600000
        run: |
          set -o pipefail
          pnpm test:desktop 2>&1 | tee test-desktop.log || {
            # Cargo's in-place progress lines can consume GitHub's annotation
            # limit before the actual desktop smoke failure is reached. Keep
            # only the application/runtime tail and strip terminal escapes.
            diagnostic="$(
              tr '\r' '\n' < test-desktop.log |
                perl -pe 's/\e\[[0-9;?]*[ -\/]*[@-~]//g' |
                sed -E 's/^(ATOOLS_DESKTOP_SMOKE ).*/\1<snapshot omitted; validation result follows>/' |
                awk '/Running `.*target\/debug\/atools`/ { runtime = 1 } runtime' |
                tail -n 24
            )"
            if [ -z "$diagnostic" ]; then
              diagnostic="$(
                tr '\r' '\n' < test-desktop.log |
                  perl -pe 's/\e\[[0-9;?]*[ -\/]*[@-~]//g' |
                  sed -E 's/^(ATOOLS_DESKTOP_SMOKE ).*/\1<snapshot omitted; validation result follows>/' |
                  tail -n 24
              )"
            fi
            diagnostic="${diagnostic//'%'/'%25'}"
            diagnostic="${diagnostic//$'\r'/'%0D'}"
            diagnostic="${diagnostic//$'\n'/'%0A'}"
            echo "::error title=Desktop-tier diagnostics::$diagnostic"
            exit 1
          }

  release-readiness:
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:check:macos:unsigned

  performance-evidence:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Record 10k and 100k search latency evidence
        run: pnpm benchmark:search:ci
      - name: Upload reproducible performance report
        uses: actions/upload-artifact@v7
        with:
          name: search-performance-${{ github.sha }}
          path: artifacts/performance/search-index.json
          if-no-files-found: error
          retention-days: 30
