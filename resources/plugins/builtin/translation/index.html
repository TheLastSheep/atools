<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>翻译</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header h2 { font-size: 18px; font-weight: 600; }
    .lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .lang-select {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      outline: none;
    }
    .swap-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #d2d2d7;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .swap-btn:hover {
      border-color: #0071e3;
      color: #0071e3;
      transform: rotate(180deg);
    }
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      outline: none;
      resize: vertical;
      min-height: 140px;
      font-family: inherit;
      line-height: 1.6;
    }
    textarea:focus { border-color: #0071e3; }
    .output {
      width: 100%;
      padding: 12px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      min-height: 140px;
      font-family: inherit;
      line-height: 1.6;
      overflow-y: auto;
      word-break: break-word;
    }
    .output.empty {
      color: #86868b;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .btn {
      padding: 8px 16px;
      background: #fff;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .btn:hover { border-color: #0071e3; color: #0071e3; }
    .btn.primary { background: #0071e3; color: #fff; border-color: #0071e3; }
    .btn.primary:hover { background: #005ec2; }
    .status {
      margin-top: 8px;
      font-size: 11px;
      color: #86868b;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🌐 翻译</h2>
  </div>
  <div class="lang-row">
    <select class="lang-select" id="from-lang">
      <option value="auto">自动检测</option>
      <option value="zh">中文</option>
      <option value="en">英文</option>
      <option value="ja">日语</option>
      <option value="ko">韩语</option>
    </select>
    <button class="swap-btn" id="swap-btn" title="交换语言">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M7 16V4M7 4L3 8M7 4l4 4M17 8v12M17 20l4-4M17 20l-4-4"/>
      </svg>
    </button>
    <select class="lang-select" id="to-lang">
      <option value="en">英文</option>
      <option value="zh">中文</option>
      <option value="ja">日语</option>
      <option value="ko">韩语</option>
    </select>
  </div>
  <div class="main">
    <textarea id="input" placeholder="输入要翻译的文本..."></textarea>
    <div class="output empty" id="output">翻译结果将显示在这里</div>
  </div>
  <div class="actions">
    <button class="btn" id="clear-btn">清空</button>
    <button class="btn" id="copy-btn">复制结果</button>
    <button class="btn primary" id="translate-btn">翻译</button>
  </div>
  <div class="status" id="status">输入文本后点击翻译</div>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const fromLang = document.getElementById('from-lang');
    const toLang = document.getElementById('to-lang');
    const translateBtn = document.getElementById('translate-btn');
    const swapBtn = document.getElementById('swap-btn');
    const copyBtn = document.getElementById('copy-btn');
    const clearBtn = document.getElementById('clear-btn');
    const status = document.getElementById('status');

    let debounce = null;

    async function translate() {
      const text = input.value.trim();
      if (!text) {
        output.textContent = '翻译结果将显示在这里';
        output.className = 'output empty';
        return;
      }

      const sl = fromLang.value;
      const tl = toLang.value;
      status.textContent = '翻译中...';
      output.className = 'output empty';
      output.textContent = '翻译中...';

      try {
        // 使用 Google Translate 免费接口
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('翻译服务暂时不可用');
        const data = await resp.json();

        // data[0] 是数组，每个元素是 [translated, original]
        let result = '';
        if (data && data[0]) {
          result = data[0].map(item => item[0] || '').join('');
        }

        output.textContent = result || '无翻译结果';
        output.className = 'output';
        status.textContent = '✓ 翻译完成';
      } catch (e) {
        output.textContent = '⚠ ' + e.message;
        output.className = 'output empty';
        status.textContent = '✗ 翻译失败';
      }
    }

    input.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(translate, 500);
    });

    translateBtn.addEventListener('click', translate);

    swapBtn.addEventListener('click', () => {
      const tmp = fromLang.value;
      if (tmp === 'auto') return;
      fromLang.value = toLang.value;
      toLang.value = tmp;
      translate();
    });

    copyBtn.addEventListener('click', () => {
      const text = output.textContent;
      if (text && !output.classList.contains('empty')) {
        navigator.clipboard.writeText(text);
        window.utools?.showNotification('已复制到剪贴板');
      }
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      output.textContent = '翻译结果将显示在这里';
      output.className = 'output empty';
      status.textContent = '输入文本后点击翻译';
    });
  </script>
</body>
</html>
