<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>翻译</title>
  <style>
    * { box-sizing: border-box; }
    :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
    body { margin: 0; padding: 14px; background: #f6f6f8; color: #202124; }
    .toolbar { display: grid; grid-template-columns: 1fr 34px 1fr auto; gap: 8px; align-items: center; }
    select, button, textarea { font: inherit; }
    select, .swap, .secondary, .primary {
      height: 34px; border: 1px solid #d7d7dc; border-radius: 7px; background: #fff; color: inherit;
    }
    select { padding: 0 10px; }
    button { cursor: pointer; }
    button:disabled { cursor: default; opacity: .55; }
    .swap { font-size: 17px; }
    .primary { padding: 0 18px; border-color: #7357e8; background: #7357e8; color: #fff; font-weight: 600; }
    .main { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .pane { position: relative; min-width: 0; }
    textarea {
      display: block; width: 100%; height: 248px; resize: none; padding: 12px;
      border: 1px solid #d7d7dc; border-radius: 8px; outline: none; background: #fff; color: inherit;
      line-height: 1.55;
    }
    textarea:focus { border-color: #8168ed; box-shadow: 0 0 0 2px rgba(115,87,232,.12); }
    textarea[readonly] { background: #fbfbfc; }
    .count { position: absolute; right: 9px; bottom: 7px; color: #929298; font-size: 11px; }
    .footer { display: flex; align-items: center; gap: 8px; margin-top: 10px; min-height: 34px; }
    .secondary { padding: 0 13px; }
    .status { min-width: 0; flex: 1; color: #74747c; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .disclosure { color: #929298; font-size: 11px; white-space: nowrap; }
    .error { color: #c53d3d; }
    @media (prefers-color-scheme: dark) {
      body { background: #202024; color: #f1f1f3; }
      select, .swap, .secondary, textarea { border-color: #48484f; background: #2b2b30; }
      textarea[readonly] { background: #27272c; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <select id="source" aria-label="源语言">
      <option value="auto">自动检测</option><option value="zh">中文</option><option value="en">英文</option>
      <option value="ja">日语</option><option value="ko">韩语</option><option value="fr">法语</option>
      <option value="de">德语</option><option value="es">西班牙语</option><option value="ru">俄语</option>
    </select>
    <button class="swap" id="swap" title="交换语言" aria-label="交换语言">⇄</button>
    <select id="target" aria-label="目标语言">
      <option value="zh">中文</option><option value="en" selected>英文</option><option value="ja">日语</option>
      <option value="ko">韩语</option><option value="fr">法语</option><option value="de">德语</option>
      <option value="es">西班牙语</option><option value="ru">俄语</option>
    </select>
    <button class="primary" id="translate">翻译</button>
  </div>
  <div class="main">
    <div class="pane">
      <textarea id="input" maxlength="65536" placeholder="输入要翻译的文本"></textarea>
      <span class="count" id="count">0 B</span>
    </div>
    <div class="pane">
      <textarea id="output" readonly placeholder="翻译结果"></textarea>
    </div>
  </div>
  <div class="footer">
    <button class="secondary" id="clear">清空</button>
    <button class="secondary" id="copy" disabled>复制结果</button>
    <span class="status" id="status">输入文本后点击翻译</span>
    <span class="disclosure">文本将发送至 Google 翻译</span>
  </div>
  <script>
    const source = document.getElementById('source');
    const target = document.getElementById('target');
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const translateButton = document.getElementById('translate');
    const copyButton = document.getElementById('copy');
    const status = document.getElementById('status');
    const count = document.getElementById('count');

    function byteLength(value) { return new TextEncoder().encode(value).length; }
    function setBusy(busy) {
      translateButton.disabled = busy;
      translateButton.textContent = busy ? '翻译中…' : '翻译';
    }
    async function translate() {
      const text = input.value.trim();
      if (!text) { status.textContent = '请输入要翻译的文本'; input.focus(); return; }
      setBusy(true); status.className = 'status'; status.textContent = '正在通过 Rust 原生网络层翻译…';
      try {
        const result = await window.utools.translation.translate(text, source.value, target.value);
        output.value = result.translatedText || '';
        copyButton.disabled = !output.value;
        const detected = result.detectedSourceLang || source.value;
        status.textContent = `已完成 · ${detected} → ${result.targetLang} · ${result.durationMs}ms`;
      } catch (error) {
        output.value = '';
        copyButton.disabled = true;
        status.className = 'status error';
        status.textContent = `翻译失败：${error && error.message ? error.message : String(error)}`;
      } finally { setBusy(false); }
    }
    input.addEventListener('input', () => { count.textContent = `${byteLength(input.value)} B`; });
    input.addEventListener('keydown', (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') { event.preventDefault(); translate(); }
    });
    translateButton.addEventListener('click', translate);
    document.getElementById('swap').addEventListener('click', () => {
      if (source.value === 'auto') return;
      const previous = source.value; source.value = target.value; target.value = previous;
      if (output.value) { input.value = output.value; output.value = ''; copyButton.disabled = true; }
      count.textContent = `${byteLength(input.value)} B`;
    });
    document.getElementById('clear').addEventListener('click', () => {
      input.value = ''; output.value = ''; count.textContent = '0 B'; copyButton.disabled = true;
      status.className = 'status'; status.textContent = '输入文本后点击翻译'; input.focus();
    });
    copyButton.addEventListener('click', async () => {
      if (!output.value) return;
      await window.utools.copyText(output.value);
      window.utools.showNotification('翻译结果已复制');
    });
    input.focus();
  </script>
</body>
</html>
