<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>时间戳</title><style>
:root{color-scheme:light dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;color:CanvasText;background:Canvas;font-size:13px}button,input,select{font:inherit}.clock{padding:14px 16px 12px;border-bottom:1px solid color-mix(in srgb,CanvasText 10%,transparent)}.time{color:#4e69d8;font:700 28px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace}.stamp{margin-top:5px;color:GrayText;font:11px ui-monospace,SFMono-Regular,Menlo,monospace}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:11px 12px}.section{min-width:0;padding:12px;border:1px solid color-mix(in srgb,CanvasText 10%,transparent);border-radius:10px}.section h2{margin:0 0 10px;color:GrayText;font-size:11px;font-weight:600}.row{display:grid;grid-template-columns:minmax(0,1fr) 64px;gap:7px}input,select{width:100%;height:35px;padding:0 9px;border:1px solid color-mix(in srgb,CanvasText 14%,transparent);border-radius:8px;color:CanvasText;background:color-mix(in srgb,CanvasText 3%,Canvas);outline:none}.convert{border:0;border-radius:8px;color:#fff;background:#526bdb;cursor:pointer}.result{margin-top:9px;display:grid;gap:6px}.value{min-height:39px;padding:7px 9px;border-radius:7px;background:color-mix(in srgb,CanvasText 4%,Canvas);font:11px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;overflow-wrap:anywhere}.label{display:block;color:GrayText;font:10px sans-serif}.error{color:#b91c1c}.timezone{margin-top:8px}.timezone select{height:31px;font-size:11px}
</style></head><body><div class="clock"><div id="clock" class="time">--:--:--</div><div id="current" class="stamp">正在读取 Rust 系统时间…</div></div><div class="grid"><section class="section"><h2>时间戳 → 日期</h2><div class="row"><input id="timestamp" value=""><button id="timestamp-run" class="convert">转换</button></div><div id="timestamp-result" class="result"></div></section><section class="section"><h2>日期 → 时间戳</h2><div class="row"><input id="datetime" type="datetime-local" step="1"><button id="datetime-run" class="convert">转换</button></div><div class="timezone"><select id="timezone"><option value="local">本地时区</option><option value="utc">UTC</option></select></div><div id="datetime-result" class="result"></div></section></div><script>
const clock=document.getElementById('clock'),current=document.getElementById('current'),timestamp=document.getElementById('timestamp'),datetime=document.getElementById('datetime'),timezone=document.getElementById('timezone');function field(label,value){const box=document.createElement('div');box.className='value';const tag=document.createElement('span');tag.className='label';tag.textContent=label;box.append(tag,document.createTextNode(value));return box}function render(target,result){target.replaceChildren(field('本地时间',result.local),field('UTC',result.utc),field('ISO 8601',result.iso_8601),field('秒 / 毫秒',`${result.unix_seconds} / ${result.unix_milliseconds}`))}function showError(target,error){target.replaceChildren();const box=document.createElement('div');box.className='value error';box.textContent=error&&error.message?error.message:String(error);target.appendChild(box)}async function refresh(){try{const value=await window.utools.time.snapshot();clock.textContent=value.local.split(' ')[1];current.textContent=`Unix ${value.unix_seconds} · ${value.timezone_offset_minutes>=0?'+':''}${value.timezone_offset_minutes} 分钟`;if(!timestamp.value)timestamp.value=value.unix_seconds;if(!datetime.value)datetime.value=value.local.replace(' ','T')}catch(error){current.textContent=String(error)}}async function convertTimestamp(){const target=document.getElementById('timestamp-result');try{render(target,await window.utools.time.convert('timestamp',timestamp.value,null))}catch(error){showError(target,error)}}async function convertDate(){const target=document.getElementById('datetime-result');try{render(target,await window.utools.time.convert('datetime',datetime.value,timezone.value))}catch(error){showError(target,error)}}document.getElementById('timestamp-run').addEventListener('click',convertTimestamp);document.getElementById('datetime-run').addEventListener('click',convertDate);timestamp.addEventListener('keydown',event=>{if(event.key==='Enter')convertTimestamp()});refresh().then(()=>{convertTimestamp();convertDate()});setInterval(refresh,1000);
</script></body></html>
