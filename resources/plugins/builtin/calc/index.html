<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>计算稿纸</title><style>
:root{color-scheme:light dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;color:CanvasText;background:Canvas;font-size:13px}button,textarea{font:inherit}.toolbar{display:flex;align-items:center;gap:8px;min-height:48px;padding:7px 12px;border-bottom:1px solid color-mix(in srgb,CanvasText 10%,transparent)}.hint{min-width:0;flex:1;color:GrayText;font-size:11px}.run{height:34px;padding:0 16px;border:0;border-radius:8px;color:#fff;background:#576bdd;font-weight:650;cursor:pointer}.run:disabled{cursor:wait;opacity:.55}.workspace{display:grid;grid-template-columns:minmax(0,54%) minmax(0,46%);height:452px}.sheet{display:grid;grid-template-rows:minmax(0,1fr) auto;min-width:0;padding:10px 10px 10px 12px;border-right:1px solid color-mix(in srgb,CanvasText 10%,transparent)}textarea{width:100%;height:100%;padding:12px;resize:none;border:1px solid color-mix(in srgb,CanvasText 13%,transparent);border-radius:9px;color:CanvasText;background:color-mix(in srgb,CanvasText 3%,Canvas);outline:none;font:13px/1.72 ui-monospace,SFMono-Regular,Menlo,monospace}textarea:focus{border-color:#6674df;box-shadow:0 0 0 2px color-mix(in srgb,#6674df 14%,transparent)}.status{min-height:27px;padding:7px 2px 0;color:GrayText;font-size:11px}.status.error{color:#b91c1c}.right{display:grid;grid-template-rows:34px minmax(0,1fr);min-width:0}.tabs{display:flex;align-items:end;gap:12px;padding:0 12px;border-bottom:1px solid color-mix(in srgb,CanvasText 9%,transparent)}.tab{height:34px;padding:0 2px;border:0;border-bottom:2px solid transparent;color:GrayText;background:transparent;cursor:pointer;font-size:11px}.tab.active{border-bottom-color:#596ddd;color:#596ddd}.tab.clear{margin-left:auto;color:#b91c1c}.panel{min-height:0;overflow:auto;padding:8px 10px 12px}.line,.history{padding:9px 8px;border-bottom:1px solid color-mix(in srgb,CanvasText 8%,transparent)}.expression{overflow-wrap:anywhere;color:GrayText;font:11px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace}.result{margin-top:3px;overflow-wrap:anywhere;color:#4f62d4;font:650 15px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace}.result.error{color:#b91c1c;font-size:11px;font-weight:500}.empty{padding:70px 12px;color:GrayText;text-align:center}.modal-backdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.36)}.modal-backdrop.open{display:flex}.modal{width:min(360px,100%);padding:18px;border:1px solid color-mix(in srgb,CanvasText 13%,transparent);border-radius:14px;background:Canvas}.modal h2{margin:0 0 8px;font-size:17px}.modal p{margin:0;color:GrayText;font-size:12px;line-height:1.6}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.actions button{height:34px;padding:0 14px;border:0;border-radius:8px;cursor:pointer}.cancel{color:CanvasText;background:color-mix(in srgb,CanvasText 7%,Canvas)}.confirm{color:#fff;background:#dc2626}
</style></head><body>
<div class="toolbar"><span class="hint">每行一个表达式 · 支持 + − × ÷ ^、括号及常用数学函数</span><button id="run" class="run" type="button">计算 ⌘↵</button></div>
<div class="workspace"><section class="sheet"><textarea id="input" spellcheck="false" placeholder="2 + 3 * 4&#10;sqrt(16) + ln(e)&#10;sin(pi / 2)">2 + 3 * 4
sqrt(16) + ln(e)</textarea><div id="status" class="status">Rust 计算结果会保存到本地 SQLite 历史</div></section><section class="right"><div class="tabs"><button class="tab active" data-tab="result" type="button">结果</button><button class="tab" data-tab="history" type="button">历史</button><button id="clear" class="tab clear" type="button">清空</button></div><div id="panel" class="panel"><div class="empty">按 ⌘↵ 开始计算</div></div></section></div>
<div id="modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title"><div class="modal"><h2 id="modal-title">清空计算历史</h2><p>将删除计算稿纸保存在本地 SQLite 中的历史记录，此操作不可撤销。</p><div class="actions"><button id="cancel" class="cancel" type="button">取消</button><button id="confirm" class="confirm" type="button">清空</button></div></div></div>
<script>
const input=document.getElementById('input'),panel=document.getElementById('panel'),status=document.getElementById('status'),run=document.getElementById('run'),modal=document.getElementById('modal');let sheet=null,history=[],tab='result';function setStatus(message,error){status.textContent=message;status.className=`status${error?' error':''}`}
function render(){panel.replaceChildren();const values=tab==='history'?history:(sheet?sheet.lines:[]);if(!values.length){const empty=document.createElement('div');empty.className='empty';empty.textContent=tab==='history'?'暂无历史记录':'按 ⌘↵ 开始计算';panel.appendChild(empty);return}for(const item of values){const row=document.createElement('div');row.className=tab==='history'?'history':'line';const expression=document.createElement('div');expression.className='expression';expression.textContent=item.expression;const result=document.createElement('div');result.className=`result${item.error?' error':''}`;result.textContent=item.error||`= ${item.result}`;row.append(expression,result);panel.appendChild(row)}}
async function calculate(){run.disabled=true;run.textContent='计算中';setStatus('Rust 正在解析整张稿纸…',false);try{sheet=await window.utools.calculation.evaluate(input.value);tab='result';syncTabs();setStatus(`${sheet.success_count}/${sheet.lines.length} 行计算成功 · 已写入 SQLite 历史`,false);render();history=await window.utools.calculation.history()}catch(error){setStatus(error&&error.message?error.message:String(error),true)}finally{run.disabled=false;run.textContent='计算 ⌘↵'}}
async function loadHistory(){try{history=await window.utools.calculation.history();if(tab==='history')render()}catch(error){setStatus(error&&error.message?error.message:String(error),true)}}function syncTabs(){document.querySelectorAll('[data-tab]').forEach(button=>button.classList.toggle('active',button.dataset.tab===tab))}function closeModal(){modal.classList.remove('open')}
run.addEventListener('click',calculate);input.addEventListener('keydown',event=>{if(event.key==='Enter'&&event.metaKey){event.preventDefault();calculate()}});document.querySelectorAll('[data-tab]').forEach(button=>button.addEventListener('click',()=>{tab=button.dataset.tab;syncTabs();render()}));document.getElementById('clear').addEventListener('click',()=>modal.classList.add('open'));document.getElementById('cancel').addEventListener('click',closeModal);document.getElementById('confirm').addEventListener('click',async()=>{closeModal();try{const count=await window.utools.calculation.clearHistory(true);history=[];setStatus(`已清空 ${count} 条历史`,false);render()}catch(error){setStatus(error&&error.message?error.message:String(error),true)}});modal.addEventListener('click',event=>{if(event.target===modal)closeModal()});document.addEventListener('keydown',event=>{if(event.key==='Escape')closeModal()});loadHistory();
</script></body></html>
