<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>计算器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header h2 {
      font-size: 18px;
      font-weight: 600;
    }
    .input-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #86868b;
      margin-bottom: 6px;
    }
    .calc-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      outline: none;
      font-family: "SF Mono", "JetBrains Mono", monospace;
    }
    .calc-input:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
    }
    .result-box {
      background: #fff;
      border: 1px solid #e4e4e6;
      border-radius: 8px;
      padding: 16px;
      min-height: 60px;
    }
    .result-label {
      font-size: 12px;
      color: #86868b;
      margin-bottom: 4px;
    }
    .result-value {
      font-size: 24px;
      font-weight: 600;
      color: #0071e3;
      font-family: "SF Mono", "JetBrains Mono", monospace;
    }
    .empty-state, .error-state {
      text-align: center;
      padding: 24px 16px;
      color: #86868b;
      font-size: 14px;
    }
    .error-state {
      color: #ff3b30;
    }
    .examples {
      margin-top: 16px;
      font-size: 12px;
      color: #86868b;
    }
    .examples h3 {
      font-size: 13px;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 8px;
    }
    .example-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .example-item {
      padding: 8px 12px;
      background: #fff;
      border: 1px solid #e4e4e6;
      border-radius: 6px;
      font-family: "SF Mono", "JetBrains Mono", monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .example-item:hover {
      border-color: #0071e3;
      background: #f8f8fa;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🧮 计算器</h2>
  </div>
  <div class="input-group">
    <label>输入数学表达式</label>
    <input type="text" class="calc-input" id="calc-input" placeholder="例如: 2 + 3 * 4" />
  </div>
  <div class="result-box" id="result-box">
    <div class="empty-state">输入表达式开始计算</div>
  </div>
  <div class="examples">
    <h3>示例</h3>
    <div class="example-grid">
      <div class="example-item" data-calc="2 + 3 * 4">2 + 3 * 4</div>
      <div class="example-item" data-calc="sqrt(16) + log(100)">sqrt(16) + log(100)</div>
      <div class="example-item" data-calc="sin(45 * PI / 180)">sin(45°)</div>
      <div class="example-item" data-calc="(10 + 20) / 3">(10 + 20) / 3</div>
    </div>
  </div>

  <script>
    const input = document.getElementById('calc-input');
    const resultBox = document.getElementById('result-box');

    function safeEval(expr) {
      try {
        const safeExpr = expr
          .replace(/sqrt/g, 'Math.sqrt')
          .replace(/sin/g, 'Math.sin')
          .replace(/cos/g, 'Math.cos')
          .replace(/tan/g, 'Math.tan')
          .replace(/log/g, 'Math.log10')
          .replace(/ln/g, 'Math.log')
          .replace(/PI/g, 'Math.PI')
          .replace(/E/g, 'Math.E')
          .replace(/abs/g, 'Math.abs')
          .replace(/round/g, 'Math.round')
          .replace(/ceil/g, 'Math.ceil')
          .replace(/floor/g, 'Math.floor');

        // Use Function for evaluation
        return Function(`"use strict"; return ${safeExpr}`)();
      } catch (e) {
        throw new Error('无效的表达式');
      }
    }

    function calculate() {
      const expr = input.value.trim();
      if (!expr) {
        resultBox.innerHTML = '<div class="empty-state">输入表达式开始计算</div>';
        return;
      }

      try {
        const result = safeEval(expr);
        resultBox.innerHTML = `
          <div class="result-label">结果</div>
          <div class="result-value">${result}</div>
        `;
      } catch (e) {
        resultBox.innerHTML = `<div class="error-state">${e.message}</div>`;
      }
    }

    input.addEventListener('input', calculate);

    // Example clicks
    document.querySelectorAll('.example-item').forEach(item => {
      item.addEventListener('click', () => {
        input.value = item.dataset.calc;
        calculate();
      });
    });
  </script>
</body>
</html>
