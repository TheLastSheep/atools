<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>编码转换</title><style>
:root{color-scheme:light dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;color:CanvasText;background:Canvas;font-size:13px}button,textarea{font:inherit}.tabs{display:flex;gap:6px;align-items:center;min-height:46px;padding:8px 12px;border-bottom:1px solid color-mix(in srgb,CanvasText 10%,transparent)}.tab{height:29px;padding:0 12px;border:0;border-radius:7px;color:GrayText;background:transparent;cursor:pointer}.tab.active{color:#4d67d7;background:color-mix(in srgb,#526be0 11%,Canvas)}.status{margin-left:auto;color:GrayText;font-size:11px}.workspace{display:grid;grid-template-rows:190px minmax(0,1fr);height:454px}.input{padding:10px 12px;border-bottom:1px solid color-mix(in srgb,CanvasText 9%,transparent)}textarea{width:100%;height:100%;padding:11px;resize:none;border:1px solid color-mix(in srgb,CanvasText 13%,transparent);border-radius:9px;color:CanvasText;background:color-mix(in srgb,CanvasText 3%,Canvas);outline:none;font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace}.results{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:10px 12px 12px}.card{min-width:0;display:grid;grid-template-rows:27px minmax(0,1fr);border:1px solid color-mix(in srgb,CanvasText 10%,transparent);border-radius:9px;overflow:hidden}.card header{display:flex;align-items:center;padding:0 10px;border-bottom:1px solid color-mix(in srgb,CanvasText 8%,transparent);color:GrayText;font-size:11px}.value{margin:0;overflow:auto;padding:10px;white-space:pre-wrap;overflow-wrap:anywhere;font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace}.value.error{color:#b91c1c}
</style></head><body><div class="tabs"><button class="tab active" data-kind="base64">Base64</button><button class="tab" data-kind="url">URL</button><button class="tab" data-kind="unicode">Unicode</button><span id="status" class="status">Rust 原生转换</span></div><div class="workspace"><div class="input"><textarea id="input" placeholder="输入要编码或解码的文本…"></textarea></div><div class="results"><section class="card"><header>编码结果</header><pre id="encoded" class="value"></pre></section><section class="card"><header>解码结果</header><pre id="decoded" class="value"></pre></section></div></div><script>
const input=document.getElementById('input'),encoded=document.getElementById('encoded'),decoded=document.getElementById('decoded'),status=document.getElementById('status');let kind='base64',timer=null,runId=0;async function update(){const current=++runId,value=input.value;if(!value){encoded.textContent='';decoded.textContent='';return}status.textContent='转换中…';try{const result=await window.utools.codec.transform(kind,value);if(current!==runId)return;encoded.textContent=result.encoded;decoded.textContent=result.decoded||result.decode_error||'';decoded.classList.toggle('error',Boolean(result.decode_error));status.textContent=`${new Blob([value]).size} bytes · Rust`}catch(error){if(current!==runId)return;encoded.textContent='';decoded.textContent=error&&error.message?error.message:String(error);decoded.classList.add('error');status.textContent='转换失败'}}input.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(update,100)});document.querySelectorAll('[data-kind]').forEach(button=>button.addEventListener('click',()=>{kind=button.dataset.kind;document.querySelectorAll('[data-kind]').forEach(item=>item.classList.toggle('active',item===button));update()}));
</script></body></html>
