<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>编码转换</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header h2 {
      font-size: 18px;
      font-weight: 600;
    }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .tab {
      padding: 6px 14px;
      background: #fff;
      border: 1px solid #e4e4e6;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .tab.active {
      background: #0071e3;
      color: #fff;
      border-color: #0071e3;
    }
    label {
      display: block;
      font-size: 12px;
      color: #86868b;
      margin-bottom: 6px;
    }
    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
      outline: none;
      resize: vertical;
      min-height: 80px;
      font-family: "SF Mono", "JetBrains Mono", monospace;
    }
    textarea:focus {
      border-color: #0071e3;
    }
    .result-item {
      background: #fff;
      border: 1px solid #e4e4e6;
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 10px;
      cursor: pointer;
    }
    .result-item:hover {
      border-color: #0071e3;
    }
    .result-label {
      font-size: 11px;
      color: #86868b;
      margin-bottom: 4px;
    }
    .result-value {
      font-size: 13px;
      color: #1d1d1f;
      font-family: "SF Mono", "JetBrains Mono", monospace;
      word-break: break-all;
    }
    .error-state {
      color: #ff3b30;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🔐 编码转换</h2>
  </div>
  <div class="tabs">
    <div class="tab active" data-type="base64">Base64</div>
    <div class="tab" data-type="url">URL</div>
    <div class="tab" data-type="unicode">Unicode</div>
  </div>
  <div class="input-group">
    <label>输入文本</label>
    <textarea id="input" placeholder="输入要编码/解码的数据..."></textarea>
  </div>
  <div id="results"></div>

  <script>
    const input = document.getElementById('input');
    const results = document.getElementById('results');
    const tabs = document.querySelectorAll('.tab');
    let currentType = 'base64';

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentType = tab.dataset.type;
        update();
      });
    });

    function encode(value) {
      switch (currentType) {
        case 'base64':
          return {
            encode: btoa(unescape(encodeURIComponent(value))),
            decode: decodeURIComponent(escape(atob(value)))
          };
        case 'url':
          return { encode: encodeURIComponent(value), decode: decodeURIComponent(value) };
        case 'unicode':
          return {
            encode: Array.from(value).map(c => '\\u' + c.charCodeAt(0).toString(16).padStart(4, '0')).join(''),
            decode: value.replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
          };
      }
    }

    function update() {
      const value = input.value.trim();
      if (!value) { results.innerHTML = ''; return; }

      try {
        const { encode: enc, decode: dec } = encode(value);
        results.innerHTML = `
          <div class="result-item" onclick="navigator.clipboard.writeText(\`${enc.replace(/`/g, '\\`').replace(/\\/g, '\\\\')}\`); window.utools?.showNotification('已复制编码结果')">
            <div class="result-label">编码</div>
            <div class="result-value">${enc}</div>
          </div>
          <div class="result-item" onclick="navigator.clipboard.writeText(\`${dec.replace(/`/g, '\\`').replace(/\\/g, '\\\\')}\`); window.utools?.showNotification('已复制解码结果')">
            <div class="result-label">解码</div>
            <div class="result-value">${dec}</div>
          </div>
        `;
      } catch (e) {
        results.innerHTML = `<div class="error-state">${e.message}</div>`;
      }
    }

    input.addEventListener('input', update);
  </script>
</body>
</html>
