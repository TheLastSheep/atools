<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>剪贴板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header h2 { font-size: 18px; font-weight: 600; }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .header-actions button {
      padding: 6px 12px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
      color: #86868b;
      transition: all 0.15s;
    }
    .header-actions button:hover {
      border-color: #ff3b30;
      color: #ff3b30;
    }
    .search-bar {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      margin-bottom: 12px;
      outline: none;
    }
    .search-bar:focus { border-color: #0071e3; }
    .stats {
      font-size: 11px;
      color: #86868b;
      margin-bottom: 12px;
    }
    #clipboard-list {
      max-height: 420px;
      overflow-y: auto;
    }
    .clipboard-item {
      background: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid #e4e4e6;
      transition: all 0.15s;
    }
    .clipboard-item:hover {
      border-color: #0071e3;
      box-shadow: 0 2px 8px rgba(0, 113, 227, 0.1);
    }
    .clipboard-content {
      font-size: 14px;
      color: #1d1d1f;
      margin-bottom: 6px;
      word-break: break-all;
      white-space: pre-wrap;
      max-height: 80px;
      overflow: hidden;
      line-height: 1.5;
    }
    .clipboard-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #86868b;
    }
    .clipboard-meta .time {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .clipboard-meta .actions { display: flex; gap: 6px; }
    .clipboard-meta .actions button {
      padding: 3px 8px;
      border: 1px solid #d2d2d7;
      border-radius: 5px;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      color: #86868b;
    }
    .clipboard-meta .actions button.copy:hover {
      background: #0071e3;
      color: #fff;
      border-color: #0071e3;
    }
    .clipboard-meta .actions button.delete:hover {
      background: #ff3b30;
      color: #fff;
      border-color: #ff3b30;
    }
    .empty-state, .error-state {
      text-align: center;
      padding: 48px 16px;
      color: #86868b;
      font-size: 14px;
    }
    .error-state { color: #ff3b30; }
    .empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .add-form input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
      outline: none;
    }
    .add-form input:focus { border-color: #0071e3; }
    .add-form button {
      padding: 8px 14px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .add-form button:hover { background: #005ecb; }
  </style>
</head>
<body>
  <div class="header">
    <h2>📋 剪贴板历史</h2>
    <div class="header-actions">
      <button id="clear-all-btn">清空全部</button>
    </div>
  </div>

  <div class="add-form">
    <input type="text" id="add-input" placeholder="手动添加一条记录..." />
    <button id="add-btn">添加</button>
  </div>

  <input
    class="search-bar"
    type="text"
    id="search-input"
    placeholder="搜索剪贴板内容..."
  />

  <div class="stats" id="stats"></div>

  <div id="clipboard-list">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      加载中...
    </div>
  </div>

  <script>
    const listEl = document.getElementById('clipboard-list');
    const searchInput = document.getElementById('search-input');
    const statsEl = document.getElementById('stats');
    const addInput = document.getElementById('add-input');
    const addBtn = document.getElementById('add-btn');
    const clearAllBtn = document.getElementById('clear-all-btn');

    let allItems = [];
    let searchTerm = '';

    function formatTime(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function timeAgo(ts) {
      const diff = Date.now() - ts;
      const seconds = Math.floor(diff / 1000);
      if (seconds < 60) return '刚刚';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes} 分钟前`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours} 小时前`;
      const days = Math.floor(hours / 24);
      return `${days} 天前`;
    }

    function generateId() {
      return 'clip_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    }

    function getText(item) {
      // Serde flatten: { _id, data: { text } } -> doc.data = { data: { text } }
      // Or direct: item.data?.text works if not flattened
      return item.data?.data?.text || item.data?.text || '';
    }

    function getTimestamp(item) {
      return item.data?.data?.timestamp || item.data?.timestamp || 0;
    }

    function renderItems() {
      const filtered = searchTerm
        ? allItems.filter(item => getText(item).toLowerCase().includes(searchTerm.toLowerCase()))
        : allItems;

      if (filtered.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            ${searchTerm ? '没有找到匹配的内容' : '剪贴板为空，复制或添加内容开始使用'}
          </div>
        `;
        statsEl.textContent = searchTerm
          ? `${filtered.length} / ${allItems.length} 条匹配`
          : '暂无记录';
        return;
      }

      // Sort by timestamp descending (newest first)
      const sorted = [...filtered].sort((a, b) => getTimestamp(b) - getTimestamp(a));

      listEl.innerHTML = sorted.map(item => {
        const text = getText(item);
        const ts = getTimestamp(item);
        const escaped = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return `
          <div class="clipboard-item" data-id="${item._id}">
            <div class="clipboard-content">${escaped}</div>
            <div class="clipboard-meta">
              <div class="time">
                <span title="${formatTime(ts)}">${timeAgo(ts)}</span>
                <span>·</span>
                <span>${text.length} 字符</span>
              </div>
              <div class="actions">
                <button class="copy" onclick="event.stopPropagation(); copyItem('${item._id}')">复制</button>
                <button class="delete" onclick="event.stopPropagation(); deleteItem('${item._id}')">删除</button>
              </div>
            </div>
          </div>
        `;
      }).join('');

      statsEl.textContent = searchTerm
        ? `${filtered.length} / ${allItems.length} 条匹配`
        : `共 ${allItems.length} 条记录`;

      // Click to copy
      listEl.querySelectorAll('.clipboard-item').forEach(el => {
        el.addEventListener('click', function() {
          const id = this.dataset.id;
          copyItem(id);
        });
      });
    }

    async function loadAll() {
      try {
        const docs = await window.utools.db.allDocs({});
        allItems = Array.isArray(docs) ? docs : [];
        renderItems();
      } catch (e) {
        console.error('[clipboard] loadAll failed:', e);
        listEl.innerHTML = `<div class="error-state">加载失败: ${e}</div>`;
      }
    }

    async function saveItem(text) {
      if (!text.trim()) return;
      const id = generateId();
      await window.utools.db.put({
        _id: id,
        data: {
          text: text,
          timestamp: Date.now(),
        }
      });
    }

    async function copyItem(id) {
      const item = allItems.find(i => i._id === id);
      if (!item) return;
      const text = getText(item);
      try {
        await window.utools.copyText(text);
        window.utools.showNotification('已复制: ' + text.slice(0, 30) + (text.length > 30 ? '...' : ''));
      } catch (e) {
        // Fallback
        try {
          await navigator.clipboard.writeText(text);
        } catch(_) {}
      }
    }

    async function deleteItem(id) {
      try {
        await window.utools.db.remove(id);
        allItems = allItems.filter(i => i._id !== id);
        renderItems();
      } catch (e) {
        console.error('[clipboard] delete failed:', e);
      }
    }

    async function clearAll() {
      if (!confirm('确定要清空所有剪贴板记录吗？')) return;
      for (const item of allItems) {
        try {
          await window.utools.db.remove(item._id);
        } catch (e) {
          console.warn('[clipboard] clear item failed:', item._id, e);
        }
      }
      allItems = [];
      renderItems();
      window.utools.showNotification('已清空全部剪贴板记录');
    }

    // Events
    searchInput.addEventListener('input', (e) => {
      searchTerm = e.target.value;
      renderItems();
    });

    async function addNewItem() {
      const text = addInput.value.trim();
      if (!text) return;
      try {
        await saveItem(text);
        addInput.value = '';
        await loadAll();
        window.utools.showNotification('已添加记录');
      } catch (e) {
        console.error('[clipboard] add failed:', e);
      }
    }

    addBtn.addEventListener('click', addNewItem);
    addInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addNewItem();
    });

    clearAllBtn.addEventListener('click', clearAll);

    // Make functions available globally for preload.js
    window.loadClipboardHistory = loadAll;

    // Auto-load on ready (preload.js will also trigger via lifecycle)
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        // Wait for utools bridge to be ready
        setTimeout(loadAll, 100);
      });
    } else {
      setTimeout(loadAll, 100);
    }
  </script>
</body>
</html>
