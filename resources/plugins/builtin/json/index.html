<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JSON 查看器</title><style>
:root{color-scheme:light dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;color:CanvasText;background:Canvas;font-size:13px}button,textarea{font:inherit}.toolbar{display:flex;align-items:center;gap:7px;min-height:46px;padding:7px 12px;border-bottom:1px solid color-mix(in srgb,CanvasText 10%,transparent)}.status{min-width:0;flex:1;color:GrayText;font-size:11px}.toolbar button{height:31px;padding:0 12px;border:0;border-radius:8px;color:#5266d0;background:color-mix(in srgb,#536bda 10%,Canvas);cursor:pointer}.toolbar .primary{color:#fff;background:#536bda}.main{display:grid;grid-template-columns:1fr 1fr;gap:9px;height:454px;padding:10px 12px 12px}.column{min-width:0;display:grid;grid-template-rows:24px minmax(0,1fr)}label{color:GrayText;font-size:11px}textarea{width:100%;height:100%;padding:11px;resize:none;border:1px solid color-mix(in srgb,CanvasText 13%,transparent);border-radius:9px;color:CanvasText;background:color-mix(in srgb,CanvasText 3%,Canvas);outline:none;font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace}.output.invalid{color:#b91c1c}.output.valid{color:CanvasText}
</style></head><body><div class="toolbar"><span id="status" class="status">等待输入</span><button id="clear">清空</button><button id="copy">复制</button><button id="compact">压缩</button><button id="format" class="primary">格式化</button></div><main class="main"><div class="column"><label>输入 JSON</label><textarea id="input" placeholder="粘贴 JSON 数据…"></textarea></div><div class="column"><label>Rust 输出</label><textarea id="output" class="output" readonly placeholder="格式化结果"></textarea></div></main><script>
const input=document.getElementById('input'),output=document.getElementById('output'),status=document.getElementById('status');let result=null,timer=null,runId=0;async function transform(){const current=++runId,value=input.value;if(!value.trim()){result=null;output.value='';status.textContent='等待输入';return}status.textContent='Rust 正在解析…';try{result=await window.utools.json.transform(value);if(current!==runId)return;output.value=result.formatted;output.className='output valid';status.textContent=`✓ 有效 ${result.root_type} · ${result.item_count} 个键/元素 · ${result.compact_bytes} bytes`}catch(error){if(current!==runId)return;result=null;output.value=error&&error.message?error.message:String(error);output.className='output invalid';status.textContent='✗ 无效 JSON'}}input.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(transform,120)});document.getElementById('format').addEventListener('click',async()=>{await transform();if(result){input.value=result.formatted;output.value=result.formatted}});document.getElementById('compact').addEventListener('click',async()=>{await transform();if(result){input.value=result.compact;output.value=result.compact}});document.getElementById('clear').addEventListener('click',()=>{input.value='';transform();input.focus()});document.getElementById('copy').addEventListener('click',async()=>{if(!output.value)return;try{await window.utools.copyText(output.value);status.textContent='已复制输出'}catch(error){status.textContent=String(error)}});
</script></body></html>
