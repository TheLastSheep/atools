<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>二维码</title><style>
:root{color-scheme:light dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;color:CanvasText;background:Canvas;font-size:13px}button,textarea,select{font:inherit}.form{display:grid;grid-template-rows:105px 38px;gap:8px;padding:11px 12px;border-bottom:1px solid color-mix(in srgb,CanvasText 10%,transparent)}textarea,select{border:1px solid color-mix(in srgb,CanvasText 14%,transparent);border-radius:8px;color:CanvasText;background:color-mix(in srgb,CanvasText 3%,Canvas);outline:none}textarea{padding:10px;resize:none}.options{display:grid;grid-template-columns:1fr 1fr 82px;gap:8px}select{padding:0 9px}.generate{border:0;border-radius:8px;color:#fff;background:#536cdb;font-weight:650;cursor:pointer}.generate:disabled{cursor:wait;opacity:.55}.preview{height:335px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px}.frame{display:grid;place-items:center;min-width:220px;min-height:220px;padding:10px;border:1px solid color-mix(in srgb,CanvasText 10%,transparent);border-radius:11px;background:#fff}.frame img{display:block;max-width:260px;max-height:260px;image-rendering:pixelated}.actions{display:flex;gap:8px}.actions button{height:32px;padding:0 13px;border:0;border-radius:8px;color:#5064ce;background:color-mix(in srgb,#536cdb 10%,Canvas);cursor:pointer}.status{color:GrayText;font-size:11px}.status.error{color:#b91c1c}
</style></head><body><div class="form"><textarea id="text" maxlength="4096" placeholder="输入文本或 URL">ATools 3.0</textarea><div class="options"><select id="size"><option value="192">192 px</option><option value="256" selected>256 px</option><option value="384">384 px</option><option value="512">512 px</option></select><select id="level"><option value="L">L · 7%</option><option value="M" selected>M · 15%</option><option value="Q">Q · 25%</option><option value="H">H · 30%</option></select><button id="generate" class="generate">生成</button></div></div><div class="preview"><div class="frame"><img id="image" alt="二维码预览"></div><div class="actions"><button id="copy" type="button">复制图片</button><button id="download" type="button">下载 PNG</button></div><div id="status" class="status">Rust 离线生成</div></div><script>
const text=document.getElementById('text'),size=document.getElementById('size'),level=document.getElementById('level'),generate=document.getElementById('generate'),image=document.getElementById('image'),status=document.getElementById('status');let current=null;function setStatus(message,error){status.textContent=message;status.className=`status${error?' error':''}`}async function run(){generate.disabled=true;setStatus('Rust 正在生成二维码…',false);try{current=await window.utools.qr.generate(text.value,Number(size.value),level.value);image.src=current.data_url;image.width=current.width;image.height=current.height;setStatus(`${current.width} × ${current.height} · ${current.png_bytes} bytes · 容错 ${current.error_correction}`,false)}catch(error){current=null;image.removeAttribute('src');setStatus(error&&error.message?error.message:String(error),true)}finally{generate.disabled=false}}generate.addEventListener('click',run);text.addEventListener('keydown',event=>{if(event.key==='Enter'&&(event.metaKey||event.ctrlKey)){event.preventDefault();run()}});document.getElementById('copy').addEventListener('click',async()=>{if(!current)return;try{await window.utools.copyImage(current.data_url);setStatus('二维码已复制到剪贴板',false)}catch(error){setStatus(error&&error.message?error.message:String(error),true)}});document.getElementById('download').addEventListener('click',()=>{if(!current)return;const link=document.createElement('a');link.href=current.data_url;link.download='atools-qrcode.png';link.click()});run();
</script></body></html>
