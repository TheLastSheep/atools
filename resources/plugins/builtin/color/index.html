<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>颜色转换</title><style>
:root{color-scheme:light dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;color:CanvasText;background:Canvas;font-size:13px}input,button{font:inherit}.input{display:grid;grid-template-columns:minmax(0,1fr) 42px;gap:8px;padding:12px;border-bottom:1px solid color-mix(in srgb,CanvasText 10%,transparent)}input[type=text]{height:38px;padding:0 11px;border:1px solid color-mix(in srgb,CanvasText 14%,transparent);border-radius:9px;color:CanvasText;background:color-mix(in srgb,CanvasText 3%,Canvas);outline:none}.swatch{width:42px;height:38px;border:1px solid color-mix(in srgb,CanvasText 12%,transparent);border-radius:9px;background:#3498db}.preview{height:145px;margin:11px 12px;border-radius:11px;background:#3498db;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}.results{display:grid;grid-template-columns:1fr;gap:8px;padding:0 12px 12px}.row{display:grid;grid-template-columns:55px minmax(0,1fr) 48px;align-items:center;min-height:49px;padding:0 10px;border:1px solid color-mix(in srgb,CanvasText 9%,transparent);border-radius:9px}.label{color:GrayText;font-size:10px}.value{overflow-wrap:anywhere;font:13px ui-monospace,SFMono-Regular,Menlo,monospace}.copy{height:28px;border:0;border-radius:7px;color:#5265cc;background:color-mix(in srgb,#536bda 10%,Canvas);cursor:pointer}.status{padding:0 13px 9px;color:GrayText;font-size:11px}.status.error{color:#b91c1c}
</style></head><body><div class="input"><input id="input" type="text" value="#3498db" placeholder="#3498db / rgb(52, 152, 219) / hsl(204, 70%, 53%)"><div id="swatch" class="swatch"></div></div><div id="preview" class="preview"></div><div id="results" class="results"></div><div id="status" class="status">Rust 原生颜色解析</div><script>
const input=document.getElementById('input'),preview=document.getElementById('preview'),swatch=document.getElementById('swatch'),results=document.getElementById('results'),status=document.getElementById('status');let timer=null,runId=0,current=null;function render(){results.replaceChildren();for(const [label,value] of [['HEX',current.hex],['RGB',current.rgb],['HSL',current.hsl]]){const row=document.createElement('div');row.className='row';const tag=document.createElement('span');tag.className='label';tag.textContent=label;const text=document.createElement('span');text.className='value';text.textContent=value;const copy=document.createElement('button');copy.className='copy';copy.textContent='复制';copy.addEventListener('click',async()=>{try{await window.utools.copyText(value);status.textContent=`已复制 ${label}`}catch(error){status.textContent=String(error)}});row.append(tag,text,copy);results.appendChild(row)}}async function update(){const currentRun=++runId;try{current=await window.utools.color.convert(input.value);if(currentRun!==runId)return;preview.style.background=current.hex;swatch.style.background=current.hex;status.className='status';status.textContent=`RGB ${current.red}, ${current.green}, ${current.blue} · Alpha ${current.alpha}`;render()}catch(error){if(currentRun!==runId)return;current=null;results.replaceChildren();status.className='status error';status.textContent=error&&error.message?error.message:String(error)}}input.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(update,80)});update();
</script></body></html>
