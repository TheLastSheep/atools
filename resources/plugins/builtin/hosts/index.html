<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Hosts 编辑器</title>
<style>
:root{color-scheme:light dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;color:CanvasText;background:Canvas;font-size:13px}button,textarea{font:inherit}.toolbar{display:flex;align-items:center;gap:8px;min-height:52px;padding:8px 12px;border-bottom:1px solid color-mix(in srgb,CanvasText 10%,transparent)}.path{min-width:0;flex:1;overflow:hidden;color:GrayText;font:11px ui-monospace,SFMono-Regular,Menlo,monospace;text-overflow:ellipsis;white-space:nowrap}button{height:34px;padding:0 14px;border:0;border-radius:8px;cursor:pointer}.reload{color:CanvasText;background:color-mix(in srgb,CanvasText 7%,Canvas)}.save{color:#fff;background:#347fda;font-weight:650}button:disabled{cursor:wait;opacity:.55}.notice{display:flex;align-items:center;min-height:34px;padding:0 13px;border-bottom:1px solid color-mix(in srgb,CanvasText 8%,transparent);color:GrayText;font-size:11px}.notice.changed{color:#b45309}.notice.success{color:#15803d}.notice.error{color:#b91c1c}.editor-wrap{height:414px;padding:10px 12px 12px}textarea{width:100%;height:100%;padding:12px;resize:none;border:1px solid color-mix(in srgb,CanvasText 13%,transparent);border-radius:9px;color:CanvasText;background:color-mix(in srgb,CanvasText 3%,Canvas);outline:none;font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;tab-size:2}textarea:focus{border-color:#4f82d9;box-shadow:0 0 0 2px color-mix(in srgb,#4f82d9 15%,transparent)}.modal-backdrop{position:fixed;inset:0;z-index:10;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.38)}.modal-backdrop.open{display:flex}.modal{width:min(410px,100%);padding:19px;border:1px solid color-mix(in srgb,CanvasText 13%,transparent);border-radius:14px;background:Canvas;box-shadow:0 22px 60px rgba(0,0,0,.25)}.modal h2{margin:0 0 9px;font-size:17px}.modal p{margin:0;color:GrayText;font-size:12px;line-height:1.65}.modal strong{color:CanvasText}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.cancel{color:CanvasText;background:color-mix(in srgb,CanvasText 7%,Canvas)}.confirm{color:#fff;background:#347fda}
</style></head><body>
<div class="toolbar"><div id="path" class="path">/etc/hosts</div><button id="reload" class="reload" type="button">重新读取</button><button id="save" class="save" type="button" disabled>保存</button></div>
<div id="notice" class="notice">正在读取本机 hosts…</div><div class="editor-wrap"><textarea id="editor" spellcheck="false" aria-label="Hosts 内容"></textarea></div>
<div id="modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title"><div class="modal"><h2 id="modal-title">确认修改系统 Hosts</h2><p>ATools 会先把当前文件备份到 <strong>~/.atools/backups/hosts</strong>，再请求 macOS 管理员授权写入并刷新 DNS 缓存。保存期间系统会显示密码或 Touch ID 授权窗口。</p><div class="actions"><button id="cancel" class="cancel" type="button">取消</button><button id="confirm" class="confirm" type="button">继续并授权</button></div></div></div>
<script>
const editor=document.getElementById('editor'),path=document.getElementById('path'),notice=document.getElementById('notice'),reload=document.getElementById('reload'),save=document.getElementById('save'),modal=document.getElementById('modal');let original='',busy=false;
function setNotice(message,type){notice.textContent=message;notice.className=`notice${type?` ${type}`:''}`}
function syncChanged(){const changed=editor.value!==original;save.disabled=busy||!changed;if(!busy&&changed)setNotice(`${new Blob([editor.value]).size} bytes · 有未保存修改`,'changed');if(!busy&&!changed)setNotice(`${new Blob([editor.value]).size} bytes · 已与磁盘同步`,'')}
async function loadHosts(){busy=true;reload.disabled=true;save.disabled=true;setNotice('正在读取本机 hosts…','');try{const snapshot=await window.utools.hosts.read();original=snapshot.content;editor.value=snapshot.content;path.textContent=snapshot.path;path.title=snapshot.path;setNotice(`${snapshot.size_bytes} bytes · 已与磁盘同步`,'')}catch(error){setNotice(error&&error.message?error.message:String(error),'error')}finally{busy=false;reload.disabled=false;syncChanged()}}
function openConfirmation(){if(!busy&&editor.value!==original)modal.classList.add('open')}function closeConfirmation(){modal.classList.remove('open')}
async function writeHosts(){closeConfirmation();busy=true;reload.disabled=true;save.disabled=true;setNotice('正在校验并等待管理员授权…','');try{const result=await window.utools.hosts.write(editor.value,true);original=editor.value.replace(/\r\n?/g,'\n');if(!original.endsWith('\n'))original+='\n';editor.value=original;setNotice(`保存成功 · 已备份到 ${result.backup_path}`,'success')}catch(error){setNotice(error&&error.message?error.message:String(error),'error')}finally{busy=false;reload.disabled=false;save.disabled=editor.value===original}}
editor.addEventListener('input',syncChanged);reload.addEventListener('click',loadHosts);save.addEventListener('click',openConfirmation);document.getElementById('cancel').addEventListener('click',closeConfirmation);document.getElementById('confirm').addEventListener('click',writeHosts);modal.addEventListener('click',event=>{if(event.target===modal)closeConfirmation()});document.addEventListener('keydown',event=>{if(event.key==='Escape')closeConfirmation()});loadHosts();
</script></body></html>
