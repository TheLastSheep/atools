<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ToDo</title><style>
:root{color-scheme:light dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;color:CanvasText;background:Canvas;font-size:13px}button,input{font:inherit}.composer{display:grid;grid-template-columns:minmax(0,1fr) 70px;gap:8px;padding:12px;border-bottom:1px solid color-mix(in srgb,CanvasText 10%,transparent)}.composer input{height:38px;padding:0 12px;border:1px solid color-mix(in srgb,CanvasText 15%,transparent);border-radius:9px;color:CanvasText;background:color-mix(in srgb,CanvasText 3%,Canvas);outline:none}.composer input:focus{border-color:#6a66df;box-shadow:0 0 0 2px color-mix(in srgb,#6a66df 15%,transparent)}button{border:0;border-radius:8px;cursor:pointer}.add{color:#fff;background:#655edc;font-weight:650}.filters{display:flex;align-items:center;gap:7px;min-height:38px;padding:0 12px;border-bottom:1px solid color-mix(in srgb,CanvasText 9%,transparent)}.filter{height:26px;padding:0 10px;color:GrayText;background:transparent;font-size:11px}.filter.active{color:#655edc;background:color-mix(in srgb,#655edc 11%,Canvas)}.count{margin-left:auto;color:GrayText;font-size:11px}.status{min-height:28px;padding:7px 13px 4px;color:GrayText;font-size:11px}.status.error{color:#b91c1c}.list{height:370px;overflow:auto;padding:0 10px 12px}.item{display:grid;grid-template-columns:24px minmax(0,1fr) 32px;align-items:center;gap:8px;min-height:48px;border-bottom:1px solid color-mix(in srgb,CanvasText 8%,transparent)}.item input{width:16px;height:16px;accent-color:#655edc}.title{min-width:0;overflow-wrap:anywhere;line-height:1.45}.item.done .title{text-decoration:line-through;color:GrayText}.delete{width:28px;height:28px;padding:0;color:GrayText;background:transparent;font-size:18px}.delete:hover{color:#dc2626;background:color-mix(in srgb,#dc2626 9%,Canvas)}.empty{padding:80px 16px;color:GrayText;text-align:center}.modal-backdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.36)}.modal-backdrop.open{display:flex}.modal{width:min(360px,100%);padding:18px;border:1px solid color-mix(in srgb,CanvasText 13%,transparent);border-radius:14px;background:Canvas;box-shadow:0 20px 60px rgba(0,0,0,.25)}.modal h2{margin:0 0 8px;font-size:17px}.modal p{margin:0;color:GrayText;font-size:12px;line-height:1.6}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.actions button{height:34px;padding:0 14px}.cancel{color:CanvasText;background:color-mix(in srgb,CanvasText 7%,Canvas)}.confirm{color:#fff;background:#dc2626}
</style></head><body>
<div class="composer"><input id="title" maxlength="500" placeholder="添加一个待办，按 Enter 保存"><button id="add" class="add" type="button">添加</button></div>
<div class="filters"><button class="filter active" data-filter="active" type="button">进行中</button><button class="filter" data-filter="all" type="button">全部</button><button class="filter" data-filter="done" type="button">已完成</button><span id="count" class="count"></span></div>
<div id="status" class="status">正在读取 SQLite…</div><div id="list" class="list"></div>
<div id="modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title"><div class="modal"><h2 id="modal-title">删除待办</h2><p id="modal-message"></p><div class="actions"><button id="cancel" class="cancel" type="button">取消</button><button id="confirm" class="confirm" type="button">删除</button></div></div></div>
<script>
const title=document.getElementById('title'),list=document.getElementById('list'),status=document.getElementById('status'),count=document.getElementById('count'),modal=document.getElementById('modal'),modalMessage=document.getElementById('modal-message');let items=[],filter='active',pendingDelete=null,busy=false;
function visibleItems(){return items.filter(item=>filter==='all'||(filter==='done'?item.completed:!item.completed))}function setStatus(message,error){status.textContent=message;status.className=`status${error?' error':''}`}
function render(){const visible=visibleItems();list.replaceChildren();count.textContent=`${items.filter(item=>!item.completed).length} 项未完成`;if(!visible.length){const empty=document.createElement('div');empty.className='empty';empty.textContent=filter==='done'?'还没有已完成事项':'这里很清爽';list.appendChild(empty);return}for(const item of visible){const row=document.createElement('div');row.className=`item${item.completed?' done':''}`;const checkbox=document.createElement('input');checkbox.type='checkbox';checkbox.checked=item.completed;checkbox.setAttribute('aria-label','切换完成状态');checkbox.addEventListener('change',()=>toggleItem(item,checkbox.checked));const text=document.createElement('div');text.className='title';text.textContent=item.title;const remove=document.createElement('button');remove.className='delete';remove.type='button';remove.textContent='×';remove.title='删除';remove.addEventListener('click',()=>openDelete(item));row.append(checkbox,text,remove);list.appendChild(row)}}
async function load(){setStatus('正在读取 SQLite…',false);try{items=await window.utools.todos.list();setStatus('数据保存在 ATools 本地 SQLite',false);render()}catch(error){setStatus(error&&error.message?error.message:String(error),true)}}
async function addItem(){const value=title.value.trim();if(!value||busy)return;busy=true;try{const item=await window.utools.todos.save({title:value,completed:false});items=[item,...items];title.value='';setStatus('已保存到 SQLite',false);render()}catch(error){setStatus(error&&error.message?error.message:String(error),true)}finally{busy=false;title.focus()}}
async function toggleItem(item,completed){try{const saved=await window.utools.todos.save({id:item.id,title:item.title,completed});items=items.map(current=>current.id===saved.id?saved:current);render()}catch(error){setStatus(error&&error.message?error.message:String(error),true);render()}}
function openDelete(item){pendingDelete=item;modalMessage.textContent=`确定删除“${item.title}”吗？`;modal.classList.add('open')}function closeDelete(){pendingDelete=null;modal.classList.remove('open')}
async function deleteItem(){const item=pendingDelete;if(!item)return;closeDelete();try{await window.utools.todos.delete(item.id,true);items=items.filter(current=>current.id!==item.id);setStatus('待办已删除',false);render()}catch(error){setStatus(error&&error.message?error.message:String(error),true)}}
document.getElementById('add').addEventListener('click',addItem);title.addEventListener('keydown',event=>{if(event.key==='Enter')addItem()});document.querySelectorAll('[data-filter]').forEach(button=>button.addEventListener('click',()=>{filter=button.dataset.filter;document.querySelectorAll('[data-filter]').forEach(value=>value.classList.toggle('active',value===button));render()}));document.getElementById('cancel').addEventListener('click',closeDelete);document.getElementById('confirm').addEventListener('click',deleteItem);modal.addEventListener('click',event=>{if(event.target===modal)closeDelete()});document.addEventListener('keydown',event=>{if(event.key==='Escape')closeDelete()});load();
</script></body></html>
